<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自動席替えメーカー</title>
  <style>
    :root{--bg:#eef7ff;--card:#fff;--ink:#14213d;--muted:#5b6b86;--line:#cfe2ff;--blue:#2563eb;--blue-dark:#1d4ed8;--pink:#ec4899;--green:#16a34a;--amber:#f59e0b;--shadow:0 20px 55px rgba(37,99,235,.14);--radius:22px}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 12% 8%,rgba(37,99,235,.22),transparent 33%),radial-gradient(circle at 86% 12%,rgba(236,72,153,.18),transparent 30%),linear-gradient(135deg,#f8fbff,var(--bg));font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}button,textarea,input{font:inherit}button{cursor:pointer}.app{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:24px 0 34px}.hero{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:14px}.logo{width:66px;height:66px;display:grid;place-items:center;border-radius:20px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--pink));box-shadow:0 14px 30px rgba(37,99,235,.24);font-size:34px}h1{margin:0;font-size:clamp(28px,4.4vw,48px);line-height:1.05}.lead{margin:8px 0 0;color:var(--muted);font-size:clamp(14px,2vw,18px);font-weight:800;line-height:1.55}.summary{padding:12px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.78);color:#244061;font-weight:900;box-shadow:0 10px 26px rgba(15,23,42,.08);white-space:nowrap}.layout{display:grid;grid-template-columns:380px minmax(0,1fr);gap:16px;align-items:start}.panel{background:rgba(255,255,255,.94);border:1px solid rgba(207,226,255,.95);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.controls{padding:18px}.section{padding-top:16px;margin-top:16px;border-top:1px solid var(--line)}.section:first-child{padding-top:0;margin-top:0;border-top:0}.section-title{margin:0 0 10px;font-size:17px;color:#263b5e;font-weight:950}label{display:block;margin-bottom:7px;color:#40516d;font-weight:900}.name-input{width:100%;min-height:245px;padding:13px;border:2px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);line-height:1.65;resize:vertical;outline:none}.name-input:focus,.number:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.13)}.hint{margin:8px 0 0;color:var(--muted);font-size:13px;font-weight:700;line-height:1.55}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.number{width:100%;min-height:58px;padding:8px 10px;border:2px solid var(--line);border-radius:15px;background:#fff;text-align:center;color:#102a56;font-size:28px;font-weight:950;outline:none}.main-btn,.sub-btn{border:0;border-radius:15px;font-weight:950;transition:transform .14s ease,box-shadow .14s ease}.main-btn{width:100%;min-height:60px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue-dark));box-shadow:0 16px 30px rgba(37,99,235,.25);font-size:19px}.sub-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}.sub-btn{min-height:46px;color:#244061;background:#f7fbff;border:1px solid var(--line)}.main-btn:hover,.sub-btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(15,23,42,.12)}.notice{display:none;margin-top:11px;padding:11px 12px;border-radius:14px;font-size:14px;font-weight:900;line-height:1.45}.notice.ok{display:block;border:1px solid #bbf7d0;color:#047857;background:#ecfdf5}.notice.error{display:block;border:1px solid #fecdd3;color:#9f1239;background:#fff1f2}.result-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:15px 17px;border-bottom:1px solid var(--line);background:rgba(248,251,255,.8)}.result-title{margin:0;font-size:clamp(20px,3vw,30px)}.toolbar{display:flex;gap:8px}.icon-btn{width:44px;height:44px;border:1px solid var(--line);border-radius:13px;background:#fff;font-size:20px}.classroom{padding:18px;overflow:auto}.front{width:min(420px,100%);margin:0 auto 16px;padding:10px;border:2px solid #bfdbfe;border-radius:14px;background:#eff6ff;color:#1e40af;text-align:center;font-weight:950}.seats{display:grid;gap:12px;align-items:stretch}.seat{min-height:86px;display:grid;place-items:center;padding:12px;border:2px solid #dbeafe;border-radius:18px;background:linear-gradient(180deg,#fff,#f8fbff);box-shadow:0 8px 18px rgba(15,23,42,.07);text-align:center;font-size:clamp(17px,2.3vw,25px);font-weight:950;word-break:break-word}.seat.empty{color:#94a3b8;background:#f8fafc;border-style:dashed}.seat-num{display:block;margin-bottom:4px;color:var(--blue);font-size:12px;letter-spacing:.08em}.empty-state{min-height:440px;display:grid;place-items:center;text-align:center;color:var(--muted);font-weight:800}.empty-mark{width:86px;height:86px;display:grid;place-items:center;margin:0 auto 12px;border-radius:26px;background:#eff6ff;color:var(--blue);font-size:42px}@media(max-width:900px){.hero{align-items:flex-start;flex-direction:column}.summary{width:100%;text-align:center;border-radius:16px}.layout{grid-template-columns:1fr}.name-input{min-height:190px}}@media(max-width:540px){.app{width:min(100% - 18px,760px);padding-top:12px}.brand{align-items:flex-start}.logo{width:52px;height:52px;border-radius:16px}.controls,.classroom,.result-head{padding:12px}.grid2,.sub-actions{grid-template-columns:1fr}}@media print{body{background:#fff}.hero,.controls,.toolbar,.empty-state{display:none}.app{width:100%;padding:0}.layout{display:block}.panel{border:0;box-shadow:none}.classroom{overflow:visible}.seat{break-inside:avoid}}
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand"><div class="logo" aria-hidden="true">🪑</div><div><h1>自動席替えメーカー</h1><p class="lead">名前を入力して「席替えする」を押すだけ。教室の前を基準に、ランダムな座席表を作れます。</p></div></div>
      <div class="summary" id="summary" aria-live="polite">0人 / 6×5席</div>
    </header>
    <div class="layout">
      <section class="panel controls" aria-label="席替え設定">
        <div class="section"><h2 class="section-title">名前を入力</h2><label for="names">1行に1人ずつ入力してください</label><textarea id="names" class="name-input" placeholder="例：&#10;あおい&#10;はると&#10;ゆい&#10;そうた"></textarea><p class="hint">改行・読点・カンマ区切りに対応。同じ名前は1人として扱います。</p></div>
        <div class="section"><h2 class="section-title">座席の形</h2><div class="grid2"><div><label for="columns">横の席数</label><input id="columns" class="number" type="number" min="1" max="12" value="6"></div><div><label for="rows">縦の列数</label><input id="rows" class="number" type="number" min="1" max="12" value="5"></div></div><p class="hint">人数より席数が多い場合は、空席として表示されます。</p></div>
        <div class="section"><button id="shuffleBtn" class="main-btn" type="button">席替えする</button><div class="sub-actions"><button id="sampleBtn" class="sub-btn" type="button">サンプル入力</button><button id="clearBtn" class="sub-btn" type="button">クリア</button></div><div id="notice" class="notice" role="status" aria-live="polite"></div></div>
      </section>
      <section class="panel" aria-label="座席表">
        <div class="result-head"><h2 class="result-title">座席表</h2><div class="toolbar"><button id="copyBtn" class="icon-btn" type="button" title="コピー" aria-label="座席表をコピー">📋</button><button id="printBtn" class="icon-btn" type="button" title="印刷" aria-label="座席表を印刷">🖨️</button></div></div>
        <div class="classroom"><div class="front">黒板・教室の前</div><div id="empty" class="empty-state"><div><div class="empty-mark" aria-hidden="true">↕</div><p>名前を入力すると、ここに座席表が表示されます。</p></div></div><div id="seats" class="seats" hidden></div></div>
      </section>
    </div>
  </main>
  <script>
    const namesEl=document.getElementById("names"),columnsEl=document.getElementById("columns"),rowsEl=document.getElementById("rows"),summaryEl=document.getElementById("summary"),noticeEl=document.getElementById("notice"),seatsEl=document.getElementById("seats"),emptyEl=document.getElementById("empty");let lastSeats=[];function parseNames(){const seen=new Set();return namesEl.value.split(/[\n,、，]+/).map(n=>n.trim()).filter(Boolean).filter(n=>{const key=n.toLocaleLowerCase();if(seen.has(key))return false;seen.add(key);return true})}function seatSize(){return{columns:Math.max(1,Math.min(12,parseInt(columnsEl.value,10)||1)),rows:Math.max(1,Math.min(12,parseInt(rowsEl.value,10)||1))}}function shuffle(items){const array=[...items];for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]]}return array}function showNotice(message,type="ok"){noticeEl.textContent=message;noticeEl.className=`notice ${type}`}function clearNotice(){noticeEl.textContent="";noticeEl.className="notice"}function updateSummary(){const count=parseNames().length,{columns,rows}=seatSize();columnsEl.value=columns;rowsEl.value=rows;summaryEl.textContent=`${count}人 / ${columns}×${rows}席`;clearNotice()}function render(){const names=parseNames(),{columns,rows}=seatSize(),total=columns*rows;if(!names.length){showNotice("名前を1人以上入力してください。","error");return}if(names.length>total){showNotice(`席が足りません。${names.length}人に対して${total}席です。`,"error");return}lastSeats=[...shuffle(names),...Array(total-names.length).fill("")];seatsEl.style.gridTemplateColumns=`repeat(${columns}, minmax(86px, 1fr))`;seatsEl.innerHTML="";lastSeats.forEach((name,index)=>{const seat=document.createElement("div");seat.className=`seat${name?"":" empty"}`;seat.innerHTML=`<span><span class="seat-num">${index+1}</span>${name||"空席"}</span>`;seatsEl.appendChild(seat)});emptyEl.hidden=true;seatsEl.hidden=false;updateSummary();showNotice("席替えが完了しました。","ok")}function clearAll(){namesEl.value="";lastSeats=[];seatsEl.innerHTML="";seatsEl.hidden=true;emptyEl.hidden=false;updateSummary()}async function copySeats(){if(!lastSeats.length){showNotice("コピーできる座席表がまだありません。","error");return}const {columns}=seatSize();const lines=[];for(let i=0;i<lastSeats.length;i+=columns){lines.push(lastSeats.slice(i,i+columns).map(name=>name||"空席").join(" / "))}try{await navigator.clipboard.writeText(["【座席表】",...lines].join("\n"));showNotice("座席表をコピーしました。","ok")}catch{showNotice("ブラウザの設定によりコピーできませんでした。","error")}}document.getElementById("shuffleBtn").addEventListener("click",render);document.getElementById("sampleBtn").addEventListener("click",()=>{namesEl.value="あおい\nはると\nゆい\nそうた\nみなと\nさくら\nりく\nひまり\nこはる\nれん\nつむぎ\nかい";updateSummary();render()});document.getElementById("clearBtn").addEventListener("click",clearAll);document.getElementById("copyBtn").addEventListener("click",copySeats);document.getElementById("printBtn").addEventListener("click",()=>window.print());[namesEl,columnsEl,rowsEl].forEach(el=>el.addEventListener("input",updateSummary));updateSummary();
  </script>
</body>
</html>
