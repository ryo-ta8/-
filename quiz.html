<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>わいわい4択クイズ</title>
<style>
:root{--bg:#f8fbff;--ink:#172033;--muted:#64748b;--line:#dbeafe;--blue:#2563eb;--sky:#38bdf8;--pink:#ec4899;--yellow:#facc15;--green:#22c55e;--red:#ef4444;--purple:#8b5cf6;--shadow:0 20px 55px rgba(15,23,42,.14);--radius:24px}*{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 10% 10%,rgba(56,189,248,.28),transparent 30%),radial-gradient(circle at 90% 0,rgba(236,72,153,.18),transparent 30%),radial-gradient(circle at 60% 100%,rgba(250,204,21,.24),transparent 32%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.app{width:min(1220px,calc(100% - 28px));margin:0 auto;padding:18px 0 30px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.logo{width:62px;height:62px;display:grid;place-items:center;border-radius:20px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--pink));box-shadow:0 14px 30px rgba(37,99,235,.24);font-size:35px}h1{margin:0;font-size:clamp(28px,4vw,46px);line-height:1.05}.subtitle{margin:6px 0 0;color:var(--muted);font-weight:800;line-height:1.45}.mode-tabs{display:flex;gap:8px;padding:6px;border:2px solid #fff;border-radius:999px;background:rgba(255,255,255,.74);box-shadow:0 8px 22px rgba(15,23,42,.08)}.tab{min-height:44px;padding:0 18px;border:0;border-radius:999px;background:transparent;color:#334155;font-weight:950}.tab.active{color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 10px 20px rgba(37,99,235,.22)}.panel{background:rgba(255,255,255,.92);border:2px solid rgba(219,234,254,.9);border-radius:var(--radius);box-shadow:var(--shadow)}.play{min-height:calc(100vh - 126px);display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}.play-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:2px solid var(--line);background:rgba(239,246,255,.78)}.pill{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:999px;background:#fff;color:#1d4ed8;font-weight:950}.score{color:#0f766e}.question-area{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:18px;align-items:center;padding:18px}.question-card{min-height:410px;display:grid;place-items:center;text-align:center;padding:22px;border-radius:26px;background:linear-gradient(135deg,#fff,#eff6ff);border:3px solid #bfdbfe}.question-number{display:inline-block;margin-bottom:10px;padding:8px 14px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:950}.question-text{margin:0;font-size:clamp(30px,5vw,64px);line-height:1.18;font-weight:950;white-space:pre-wrap}.question-image{max-width:100%;max-height:38vh;margin-top:16px;border-radius:22px;box-shadow:0 14px 30px rgba(15,23,42,.18);object-fit:contain}.answers{display:grid;grid-template-columns:1fr;gap:13px}.answer{position:relative;min-height:88px;padding:16px 18px 16px 76px;border:0;border-radius:22px;color:#fff;text-align:left;font-size:clamp(22px,3.2vw,34px);font-weight:950;box-shadow:0 14px 26px rgba(15,23,42,.16);transition:transform .16s ease,filter .16s ease}.answer:hover{transform:translateY(-2px) scale(1.01)}.answer:disabled{cursor:not-allowed}.mark{position:absolute;left:16px;top:50%;width:44px;height:44px;display:grid;place-items:center;transform:translateY(-50%);border-radius:15px;background:rgba(255,255,255,.24);font-size:24px}.a0{background:linear-gradient(135deg,#ef4444,#f97316)}.a1{background:linear-gradient(135deg,#2563eb,#06b6d4)}.a2{background:linear-gradient(135deg,#22c55e,#14b8a6)}.a3{background:linear-gradient(135deg,#a855f7,#ec4899)}.answer.dim{filter:grayscale(.45) opacity(.56)}.answer.correct{outline:8px solid rgba(34,197,94,.32);animation:pop .55s ease}.answer.wrong{outline:8px solid rgba(239,68,68,.28);animation:shake .35s ease}.play-foot{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:14px 18px;border-top:2px solid var(--line);background:rgba(255,255,255,.68)}.main-btn,.sub-btn{min-height:54px;border:0;border-radius:16px;font-weight:950}.main-btn{padding:0 24px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 12px 24px rgba(37,99,235,.22)}.sub-btn{padding:0 18px;border:2px solid var(--line);background:#fff;color:#334155}.result-pop{position:fixed;inset:0;display:grid;place-items:center;padding:24px;background:rgba(15,23,42,.42);z-index:5}.result-box{width:min(720px,100%);padding:34px;border:6px solid #fff;border-radius:34px;text-align:center;color:#fff;box-shadow:0 30px 80px rgba(15,23,42,.28);animation:bounce .55s ease}.result-box.good{background:linear-gradient(135deg,#16a34a,#22c55e)}.result-box.bad{background:linear-gradient(135deg,#dc2626,#fb7185)}.result-icon{font-size:clamp(70px,13vw,132px);line-height:1}.result-title{margin:4px 0;font-size:clamp(42px,8vw,82px);font-weight:950}.result-note{margin:0;font-size:clamp(20px,3vw,32px);font-weight:900}.builder{display:grid;grid-template-columns:370px minmax(0,1fr);gap:16px;align-items:start}.settings,.editor{padding:16px}.section-title{margin:0 0 12px;font-size:22px}.field{margin-bottom:14px}label{display:block;margin-bottom:6px;color:#475569;font-size:13px;font-weight:900}.input,.textarea{width:100%;border:2px solid #cfe2ff;border-radius:15px;background:#fff;color:var(--ink);outline:none;font-weight:850}.input{min-height:48px;padding:0 12px}.textarea{min-height:110px;padding:12px;resize:vertical;line-height:1.55}.input:focus,.textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.12)}.question-list{display:grid;gap:8px;margin:14px 0}.q-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px;border:2px solid #e0edff;border-radius:15px;background:#fff}.q-row.active{border-color:var(--blue);background:#eff6ff}.q-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:950}.mini{border:0;border-radius:12px;padding:8px 10px;background:#e0f2fe;color:#075985;font-weight:950}.option-grid{display:grid;gap:10px}.option-row{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:10px;border:2px solid #e2e8f0;border-radius:16px;background:#f8fafc}.choice-badge{width:38px;height:38px;display:grid;place-items:center;border-radius:13px;color:#fff;font-weight:950}.radio-label{display:flex;align-items:center;gap:6px;margin:0;color:#166534}.toolbar{display:flex;flex-wrap:wrap;gap:8px}.hint{margin:8px 0 0;color:var(--muted);font-size:13px;font-weight:800;line-height:1.5}.preview-img{max-width:220px;max-height:140px;border-radius:14px;border:2px solid #dbeafe;object-fit:contain}.empty{padding:30px;text-align:center;color:var(--muted);font-weight:850}@keyframes pop{50%{transform:scale(1.04)}}@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}@keyframes bounce{0%{transform:scale(.82);opacity:.3}65%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}@media(max-width:900px){.topbar{align-items:flex-start;flex-direction:column}.question-area,.builder{grid-template-columns:1fr}.question-card{min-height:300px}.mode-tabs{width:100%;justify-content:center}.tab{flex:1}.answers{grid-template-columns:1fr 1fr}}@media(max-width:560px){.answers{grid-template-columns:1fr}.play-head{align-items:stretch;flex-direction:column}.builder{gap:10px}.option-row{grid-template-columns:auto 1fr}.radio-label{grid-column:2}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo" aria-hidden="true">🎉</div><div><h1>わいわい4択クイズ</h1><p class="subtitle">電子黒板で見やすい大画面クイズ。文章・画像の問題を作って、先生がみんなと答え合わせできます。</p></div></div><nav class="mode-tabs" aria-label="画面切り替え"><button id="playTab" class="tab active" type="button">出題する</button><button id="editTab" class="tab" type="button">クイズ作成</button></nav></header>
<section id="playView" class="panel play" aria-label="出題画面"><div class="play-head"><span class="pill" id="progressPill">1 / 3問</span><span class="pill score" id="scorePill">正解 0</span><span class="pill" id="modeHint">答えだと思うボタンを先生が押します</span></div><div id="questionArea" class="question-area"></div><div class="play-foot"><button class="sub-btn" id="prevBtn" type="button">← 前の問題</button><button class="main-btn" id="nextBtn" type="button">次の問題 →</button><button class="sub-btn" id="resetPlayBtn" type="button">最初から</button><button class="sub-btn" id="bigBtn" type="button">全画面</button><button class="sub-btn" id="exitFullBtn" type="button" hidden>全画面を終わる</button></div></section>
<section id="editView" class="builder" hidden><aside class="panel settings"><div class="settings"><h2 class="section-title">クイズ全体</h2><div class="field"><label for="quizTitle">タイトル</label><input id="quizTitle" class="input" value="どうぶつクイズ"></div><div class="toolbar"><button class="main-btn" id="addQuestionBtn" type="button">＋ 問題を追加</button><button class="sub-btn" id="duplicateBtn" type="button">複製</button><button class="sub-btn" id="deleteBtn" type="button">削除</button></div><p class="hint">左のリストで問題を選び、右で文章・画像・4択を編集します。内容はこのブラウザに自動保存されます。</p><div id="questionList" class="question-list"></div><div class="toolbar"><button class="sub-btn" id="downloadBtn" type="button">保存ファイルを作る</button><button class="sub-btn" id="openFileBtn" type="button">ファイルから開く</button><button class="sub-btn" id="sampleBtn" type="button">サンプルに戻す</button><button class="sub-btn" id="exportBtn" type="button">JSONコピー</button><input id="importFile" type="file" accept="application/json,.json,.waiwaiquiz" hidden></div><p class="hint" id="saveStatus" aria-live="polite">このブラウザには自動保存されます。別の端末で使うときは「保存ファイルを作る」でファイルに保存してください。</p></div></aside><section class="panel editor"><div class="editor" id="editorPane"></div></section></section>
</main>
<div id="resultPop" class="result-pop" hidden><div id="resultBox" class="result-box"><div id="resultIcon" class="result-icon"></div><div id="resultTitle" class="result-title"></div><p id="resultNote" class="result-note"></p></div></div>
<script>
const sampleQuiz={title:"どうぶつクイズ",questions:[{text:"世界でいちばん大きな動物はどれ？",image:"",choices:["アフリカゾウ","シロナガスクジラ","キリン","ホッキョクグマ"],answer:1},{text:"パンダがよく食べるものは？",image:"",choices:["竹","りんごだけ","魚","チーズ"],answer:0},{text:"次のうち、空を飛べる鳥はどれ？",image:"",choices:["ペンギン","ダチョウ","ツバメ","エミュー"],answer:2}]};
const colors=["a0","a1","a2","a3"],marks=["▲","◆","●","■"];let quiz=loadQuiz(),current=0,score=0,answered=false,selected=-1;const $=id=>document.getElementById(id);
function loadQuiz(){try{return normalizeQuiz(JSON.parse(localStorage.getItem("waiwaiQuiz")))||structuredClone(sampleQuiz)}catch{return structuredClone(sampleQuiz)}}
function saveQuiz(){localStorage.setItem("waiwaiQuiz",JSON.stringify(quiz));const status=$("saveStatus");if(status)status.textContent="保存しました: "+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}
function switchView(mode){$("playView").hidden=mode!=="play";$("editView").hidden=mode!=="edit";$("playTab").classList.toggle("active",mode==="play");$("editTab").classList.toggle("active",mode==="edit");if(mode==="play")renderPlay();else renderBuilder()}
function ensureQuestion(){if(!quiz.questions.length)quiz.questions.push({text:"新しい問題",image:"",choices:["答え1","答え2","答え3","答え4"],answer:0});current=Math.min(current,quiz.questions.length-1)}
function renderPlay(){ensureQuestion();const q=quiz.questions[current];$("progressPill").textContent=`${current+1} / ${quiz.questions.length}問`;$("scorePill").textContent=`正解 ${score}`;document.title=`${quiz.title} - わいわい4択クイズ`;$("questionArea").innerHTML=`<article class="question-card"><div><span class="question-number">第${current+1}問</span><h2 class="question-text"></h2>${q.image?`<img class="question-image" alt="問題画像" src="${q.image}">`:""}</div></article><div class="answers"></div>`;$("questionArea").querySelector(".question-text").textContent=q.text||"問題文を入力してください";const answers=$("questionArea").querySelector(".answers");q.choices.forEach((choice,index)=>{const btn=document.createElement("button");btn.type="button";btn.className=`answer ${colors[index]}`;btn.innerHTML=`<span class="mark">${marks[index]}</span><span></span>`;btn.querySelector("span:last-child").textContent=choice||`選択肢${index+1}`;btn.addEventListener("click",()=>choose(index));answers.appendChild(btn)});updateAnswerState()}
function choose(index){if(answered)return;answered=true;selected=index;const q=quiz.questions[current],correct=index===q.answer;if(correct)score+=1;playSound(correct);showResult(correct,q.choices[q.answer]);updateAnswerState()}
function updateAnswerState(){const q=quiz.questions[current],buttons=document.querySelectorAll(".answer");buttons.forEach((btn,index)=>{btn.disabled=answered;if(answered){btn.classList.toggle("correct",index===q.answer);btn.classList.toggle("wrong",index===selected&&index!==q.answer);btn.classList.toggle("dim",index!==q.answer&&index!==selected)}})}
function playTone(ctx,freq,start,duration,type="sine",gain=.15){const osc=ctx.createOscillator(),vol=ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime+start);vol.gain.setValueAtTime(0,ctx.currentTime+start);vol.gain.linearRampToValueAtTime(gain,ctx.currentTime+start+.02);vol.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+start+duration);osc.connect(vol).connect(ctx.destination);osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+start+duration+.04)}
function playSound(correct){const AudioContext=window.AudioContext||window.webkitAudioContext;if(!AudioContext)return;const ctx=new AudioContext();if(correct){playTone(ctx,523.25,0,.16,"triangle",.18);playTone(ctx,659.25,.13,.16,"triangle",.18);playTone(ctx,783.99,.26,.24,"triangle",.2)}else{playTone(ctx,220,0,.24,"sawtooth",.11);playTone(ctx,164.81,.22,.34,"sawtooth",.1)}}
function showResult(correct,answer){$("resultBox").className=`result-box ${correct?"good":"bad"}`;$("resultIcon").textContent=correct?"⭕":"❌";$("resultTitle").textContent=correct?"大正解！":"ざんねん！";$("resultNote").textContent=correct?"みんなで拍手！":"正解は「"+answer+"」";$("resultPop").hidden=false;setTimeout(()=>$("resultPop").hidden=true,1700)}
function move(delta){current=(current+delta+quiz.questions.length)%quiz.questions.length;answered=false;selected=-1;renderPlay()}
function renderBuilder(){ensureQuestion();$("quizTitle").value=quiz.title;const list=$("questionList");list.innerHTML="";quiz.questions.forEach((q,i)=>{const row=document.createElement("button");row.type="button";row.className=`q-row ${i===current?"active":""}`;row.innerHTML=`<span class="q-title"></span><span class="mini">編集</span>`;row.querySelector(".q-title").textContent=`${i+1}. ${q.text||"無題の問題"}`;row.addEventListener("click",()=>{current=i;renderBuilder()});list.appendChild(row)});const q=quiz.questions[current];$("editorPane").innerHTML=`<h2 class="section-title">第${current+1}問を作る</h2><div class="field"><label for="qText">問題文</label><textarea id="qText" class="textarea" placeholder="児童に見せる問題文を書きます"></textarea></div><div class="field"><label for="qImage">画像を追加（任意）</label><input id="qImage" class="input" type="file" accept="image/*"><p class="hint">写真や図を入れると、問題文の下に大きく表示されます。</p><div id="imagePreview"></div></div><h3 class="section-title">4つの答え</h3><div class="option-grid" id="optionGrid"></div>`;$("qText").value=q.text;$("qText").addEventListener("input",e=>{q.text=e.target.value;saveQuiz();const active=document.querySelector(".q-row.active .q-title");if(active)active.textContent=`${current+1}. ${q.text||"無題の問題"}`});if(q.image)$("imagePreview").innerHTML=`<img class="preview-img" alt="登録済み画像" src="${q.image}"><p><button class="mini" id="removeImage" type="button">画像を外す</button></p>`;if($("removeImage"))$("removeImage").addEventListener("click",()=>{q.image="";saveQuiz();renderBuilder()});$("qImage").addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{q.image=reader.result;saveQuiz();renderBuilder()};reader.readAsDataURL(file)});const grid=$("optionGrid");q.choices.forEach((choice,i)=>{const row=document.createElement("div");row.className="option-row";row.innerHTML=`<span class="choice-badge ${colors[i]}">${marks[i]}</span><input class="input" value=""><label class="radio-label"><input type="radio" name="answer" ${q.answer===i?"checked":""}>正解</label>`;const input=row.querySelector("input.input");input.value=choice;input.addEventListener("input",e=>{q.choices[i]=e.target.value;saveQuiz()});row.querySelector("input[type=radio]").addEventListener("change",()=>{q.answer=i;saveQuiz()});grid.appendChild(row)})}
function normalizeQuiz(data){if(!data||!Array.isArray(data.questions))return null;return{title:String(data.title||"わいわい4択クイズ"),questions:data.questions.map(item=>{const choices=Array.isArray(item.choices)?item.choices.slice(0,4).map(choice=>String(choice||"")):[];while(choices.length<4)choices.push(`答え${choices.length+1}`);let answer=Number(item.answer);if(!Number.isInteger(answer)||answer<0||answer>3)answer=0;return{text:String(item.text||""),image:String(item.image||""),choices,answer}})}}
function downloadQuizFile(){ensureQuestion();const blob=new Blob([JSON.stringify(quiz,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob),a=document.createElement("a"),name=(quiz.title||"waiwai-quiz").replace(/[\/:*?"<>|]+/g,"-").trim()||"waiwai-quiz";a.href=url;a.download=`${name}.waiwaiquiz.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);$("saveStatus").textContent="保存ファイルを作りました。ダウンロードフォルダを確認してください。"}
function openQuizFile(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const imported=normalizeQuiz(JSON.parse(reader.result));if(!imported||!imported.questions.length)throw new Error("empty");quiz=imported;current=0;score=0;answered=false;selected=-1;saveQuiz();renderBuilder();$("saveStatus").textContent="ファイルからクイズを開きました。"}catch{$("saveStatus").textContent="クイズファイルを読み込めませんでした。"}};reader.readAsText(file)}
function addQuestion(copy=false){const base=copy?structuredClone(quiz.questions[current]):{text:"新しい問題",image:"",choices:["答え1","答え2","答え3","答え4"],answer:0};quiz.questions.splice(current+1,0,base);current++;saveQuiz();renderBuilder()}
function updateFullscreenButtons(){const on=!!document.fullscreenElement;$("bigBtn").hidden=on;$("exitFullBtn").hidden=!on}
$("playTab").addEventListener("click",()=>switchView("play"));$("editTab").addEventListener("click",()=>switchView("edit"));$("prevBtn").addEventListener("click",()=>move(-1));$("nextBtn").addEventListener("click",()=>move(1));$("resetPlayBtn").addEventListener("click",()=>{current=0;score=0;answered=false;selected=-1;renderPlay()});$("bigBtn").addEventListener("click",()=>document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen());$("exitFullBtn").addEventListener("click",()=>document.exitFullscreen&&document.exitFullscreen());document.addEventListener("fullscreenchange",updateFullscreenButtons);$("resultPop").addEventListener("click",()=>$("resultPop").hidden=true);$("quizTitle").addEventListener("input",e=>{quiz.title=e.target.value;saveQuiz()});$("addQuestionBtn").addEventListener("click",()=>addQuestion(false));$("duplicateBtn").addEventListener("click",()=>addQuestion(true));$("deleteBtn").addEventListener("click",()=>{if(quiz.questions.length<=1)return;quiz.questions.splice(current,1);current=Math.max(0,current-1);saveQuiz();renderBuilder()});$("downloadBtn").addEventListener("click",downloadQuizFile);$("openFileBtn").addEventListener("click",()=>$("importFile").click());$("importFile").addEventListener("change",e=>{openQuizFile(e.target.files[0]);e.target.value=""});$("sampleBtn").addEventListener("click",()=>{quiz=structuredClone(sampleQuiz);current=0;score=0;saveQuiz();renderBuilder()});$("exportBtn").addEventListener("click",async()=>{await navigator.clipboard.writeText(JSON.stringify(quiz,null,2));$("saveStatus").textContent="JSONをコピーしました"});switchView("play");
</script>
</body>
</html>
