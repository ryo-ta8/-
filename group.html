<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ランダムグループ分け</title>
<style>
:root{--bg:#f4f7fb;--ink:#172033;--muted:#667085;--line:#d9e2ef;--blue:#2563eb;--blue-dark:#1d4ed8;--mint:#10b981;--shadow:0 18px 45px rgba(15,23,42,.12);--radius:18px}*{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(135deg,rgba(37,99,235,.11),transparent 34%),linear-gradient(315deg,rgba(16,185,129,.12),transparent 30%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:18px 0 28px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;display:grid;place-items:center;border-radius:16px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--mint));box-shadow:0 12px 28px rgba(37,99,235,.26);font-size:30px}h1{margin:0;font-size:clamp(25px,4vw,40px);line-height:1.08}.subtitle{margin:5px 0 0;color:var(--muted);font-weight:700;line-height:1.45}.summary{display:flex;align-items:center;gap:9px;min-height:42px;padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.78);color:#334155;font-weight:800;box-shadow:0 8px 24px rgba(15,23,42,.08)}.layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px;align-items:start}.panel{background:rgba(255,255,255,.92);border:1px solid rgba(217,226,239,.88);border-radius:var(--radius);box-shadow:var(--shadow)}.controls{padding:16px}.results{min-height:calc(100vh - 118px);overflow:hidden}.fit-mode{overflow:hidden}.fit-mode .topbar,.fit-mode .controls{display:none}.fit-mode .app{width:100vw;height:100vh;padding:0}.fit-mode .layout{display:block;height:100%}.fit-mode .results{height:100vh;min-height:0;border-radius:0;display:flex;flex-direction:column}.fit-mode .result-head{flex:0 0 auto}.fit-mode .groups{transform-origin:top left;will-change:transform}.fit-mode #groupsViewport{flex:1;overflow:hidden;padding:10px}.fit-mode .empty{min-height:0;height:100%}.fit-mode #fitBtn{display:none}.fit-mode #exitFitBtn{display:grid}.section{margin-top:15px;padding-top:15px;border-top:1px solid var(--line)}.section:first-child{margin-top:0;padding-top:0;border-top:0}.section-title{margin:0 0 11px;font-size:15px;color:#334155;font-weight:900}.range-grid,.button-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:block;margin-bottom:6px;color:#475467;font-size:13px;font-weight:800}.number-input,.select-box{width:100%;min-height:58px;border:2px solid var(--line);border-radius:14px;background:#fff;color:#102a56;outline:none;font-weight:900;transition:border-color .15s ease,box-shadow .15s ease}.number-input{padding:9px 10px;text-align:center;font-size:29px}.select-box{padding:0 14px;font-size:20px}.number-input:focus,.select-box:focus,.number-input.active{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.13)}.hint{margin:9px 0 0;color:var(--muted);font-size:12px;font-weight:700;line-height:1.55}.quick-row,.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.quick-btn,.key,.sub-btn,.icon-btn{border:1px solid var(--line);background:#f8fafc;color:#334155;font-weight:900;transition:transform .14s ease,box-shadow .14s ease}.quick-btn{min-height:38px;border-radius:12px;font-size:13px}.key{height:50px;border-radius:14px;font-size:21px;color:#182230;background:#fff}.key.utility{color:#0f4a6d;background:#eaf7ff}.main-btn{width:100%;min-height:58px;border:0;border-radius:15px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue-dark));box-shadow:0 16px 30px rgba(37,99,235,.24);font-size:18px;font-weight:950}.button-grid{margin-top:9px;gap:8px}.sub-btn{min-height:44px;border-radius:13px}.quick-btn:hover,.key:hover,.sub-btn:hover,.icon-btn:hover,.main-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(15,23,42,.10)}.notice{display:none;margin-top:10px;padding:10px 12px;border-radius:13px;font-size:13px;font-weight:800;line-height:1.45}.notice.error{display:block;border:1px solid #fecdd3;color:#9f1239;background:#fff1f2}.notice.ok{display:block;border:1px solid #bbf7d0;color:#047857;background:#ecfdf5}.result-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(248,250,252,.78)}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;width:100%}.stat .num{display:block;font-size:clamp(20px,3vw,30px);line-height:1;color:var(--blue);font-weight:950;overflow-wrap:anywhere}.stat .cap{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:800}.toolbar{display:flex;gap:7px}.toolbar .wide-btn{width:auto;min-width:122px;padding:0 12px;white-space:nowrap}.toolbar #exitFitBtn{display:none}.fit-mode .toolbar #exitFitBtn{display:grid}.icon-btn{width:42px;height:42px;display:grid;place-items:center;border-radius:12px;background:#fff}.empty{min-height:460px;display:grid;place-items:center;padding:32px;text-align:center;color:var(--muted)}.empty-mark{width:84px;height:84px;display:grid;place-items:center;margin:0 auto 13px;border-radius:24px;color:var(--blue);background:#eff6ff;font-size:42px}.empty h2{margin:0 0 8px;color:#334155;font-size:22px}.empty p{margin:0;font-weight:700;line-height:1.6}.groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;padding:14px}.group-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 9px 22px rgba(15,23,42,.07)}.group-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,#eff6ff,#f0fdf4);font-weight:950}.group-title{display:flex;align-items:center;gap:8px}.badge{min-width:31px;height:31px;display:inline-grid;place-items:center;border-radius:11px;color:#fff;background:var(--blue);font-size:16px;font-weight:950}.count{color:#475467;font-size:12px;font-weight:900}.members{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:8px;padding:12px}.member{min-height:42px;display:grid;place-items:center;border:1px solid #dbe4f0;border-radius:12px;background:#f8fafc;color:#111827;font-size:18px;font-weight:950}.shake{animation:shake .24s linear 2}@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}@media(max-width:900px){.app{width:min(100% - 18px,760px);padding-top:10px}.topbar{align-items:flex-start;flex-direction:column}.summary{width:100%;justify-content:center;border-radius:14px}.layout{grid-template-columns:1fr}.results{min-height:420px}}@media(max-width:520px){.toolbar .wide-btn{min-width:auto}.brand{align-items:flex-start}.logo{width:48px;height:48px;border-radius:14px}.controls,.result-head,.groups{padding:12px}.result-head{align-items:stretch;flex-direction:column}.toolbar{justify-content:flex-end}.stats{gap:7px}.range-grid,.button-grid{grid-template-columns:1fr}.groups{grid-template-columns:1fr}}@media print{body{background:#fff}.topbar,.controls,.toolbar,.empty{display:none}.app{width:100%;padding:0}.layout{display:block}.panel{border:0;box-shadow:none}.groups{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><div class="logo" aria-hidden="true">👥</div><div><h1>ランダムグループ分け</h1><p class="subtitle">番号の範囲とグループ数を選ぶだけで、人数差の少ない班を作れます。</p></div></div><div class="summary" id="summaryPill" aria-live="polite"><span>1番から31番 / 2グループ</span></div></header>
<div class="layout">
<section class="panel controls" aria-label="設定">
<div class="section"><h2 class="section-title">番号の範囲</h2><div class="range-grid"><div><label for="minNumber">最初の番号</label><input id="minNumber" class="number-input active" type="text" inputmode="numeric" value="1" aria-label="最初の番号"></div><div><label for="maxNumber">最後の番号</label><input id="maxNumber" class="number-input" type="text" inputmode="numeric" value="31" aria-label="最後の番号"></div></div><div class="quick-row" aria-label="よく使う範囲"><button class="quick-btn" type="button" data-preset="1,20">1-20</button><button class="quick-btn" type="button" data-preset="1,31">1-31</button><button class="quick-btn" type="button" data-preset="1,40">1-40</button></div><p class="hint">直接入力できます。下の数字ボタンは、選択中の入力欄に入ります。</p><div class="numpad" aria-label="数字入力"><button class="key" type="button" data-num="1">1</button><button class="key" type="button" data-num="2">2</button><button class="key" type="button" data-num="3">3</button><button class="key" type="button" data-num="4">4</button><button class="key" type="button" data-num="5">5</button><button class="key" type="button" data-num="6">6</button><button class="key" type="button" data-num="7">7</button><button class="key" type="button" data-num="8">8</button><button class="key" type="button" data-num="9">9</button><button class="key utility" type="button" id="clearBtn" aria-label="入力を消す">C</button><button class="key" type="button" data-num="0">0</button><button class="key utility" type="button" id="backBtn" aria-label="一文字戻す">⌫</button></div></div>
<div class="section"><h2 class="section-title">グループ数</h2><label for="groupCount">いくつに分けますか</label><select id="groupCount" class="select-box" aria-label="グループ数"></select><p class="hint" id="groupHelp">対象人数に合わせて、2グループから最大人数分まで選べます。</p></div>
<div class="section"><button class="main-btn" type="button" id="generateBtn">グループ分けする</button><div class="button-grid"><button class="sub-btn" type="button" id="reshuffleBtn">もう一度</button><button class="sub-btn" type="button" id="resetBtn">初期値に戻す</button></div><div id="notice" class="notice" role="status" aria-live="polite"></div></div>
</section>
<section class="panel results" aria-label="結果"><div class="result-head"><div class="stats"><div class="stat"><span class="num" id="totalStat">31</span><span class="cap">対象人数</span></div><div class="stat"><span class="num" id="groupStat">2</span><span class="cap">グループ数</span></div><div class="stat"><span class="num" id="sizeStat">15-16</span><span class="cap">1班の人数</span></div></div><div class="toolbar"><button class="icon-btn wide-btn" type="button" id="fitBtn" title="結果を一画面に表示" aria-label="結果を一画面に表示">🔎 全画面</button><button class="icon-btn wide-btn" type="button" id="exitFitBtn" title="通常表示に戻る" aria-label="通常表示に戻る">↩ 戻る</button><button class="icon-btn" type="button" id="copyBtn" title="結果をコピー" aria-label="結果をコピー">📋</button><button class="icon-btn" type="button" id="printBtn" title="印刷" aria-label="印刷">🖨️</button></div></div><div id="groupsViewport"><div id="empty" class="empty"><div><div class="empty-mark" aria-hidden="true">↔</div><h2>まだ結果はありません</h2><p>設定を確認して「グループ分けする」を押してください。</p></div></div><div id="groups" class="groups" hidden></div></div></section>
</div>
</main>
<script>
const minInput=document.getElementById("minNumber"),maxInput=document.getElementById("maxNumber"),groupSelect=document.getElementById("groupCount"),notice=document.getElementById("notice"),groupsEl=document.getElementById("groups"),emptyEl=document.getElementById("empty"),summaryPill=document.getElementById("summaryPill").querySelector("span"),totalStat=document.getElementById("totalStat"),groupStat=document.getElementById("groupStat"),sizeStat=document.getElementById("sizeStat"),groupsViewport=document.getElementById("groupsViewport"),fitBtn=document.getElementById("fitBtn"),exitFitBtn=document.getElementById("exitFitBtn");let currentInput=minInput,lastGroups=[],isFitMode=false;function setActive(input){currentInput=input;[minInput,maxInput].forEach(el=>el.classList.toggle("active",el===input));input.focus();input.select()}function cleanInput(input){input.value=input.value.replace(/[^\d]/g,"").slice(0,3).replace(/^0+(?=\d)/,"")}function getRange(){return{min:parseInt(minInput.value,10),max:parseInt(maxInput.value,10)}}function validate(){const{min,max}=getRange();if(Number.isNaN(min)||Number.isNaN(max))return"最初の番号と最後の番号を入力してください。";if(min<0||max<0)return"番号は0以上で入力してください。";if(min>=max)return"最初の番号は、最後の番号より小さくしてください。";if(max-min+1<2)return"対象人数は2人以上必要です。";return""}function refreshOptions(){const previous=parseInt(groupSelect.value,10)||2,err=validate();groupSelect.innerHTML="";if(err){const option=document.createElement("option");option.value="";option.textContent="番号の範囲を確認してください";groupSelect.appendChild(option);refreshStats();return}const{min,max}=getRange(),total=max-min+1;for(let i=2;i<=total;i++){const option=document.createElement("option");option.value=String(i);option.textContent=`${i}グループ`;groupSelect.appendChild(option)}groupSelect.value=String(Math.min(Math.max(previous,2),total));refreshStats()}function refreshStats(){const{min,max}=getRange(),validRange=!Number.isNaN(min)&&!Number.isNaN(max)&&max>=min,total=validRange?max-min+1:0,groupCount=parseInt(groupSelect.value,10)||0;totalStat.textContent=total||"-";groupStat.textContent=groupCount||"-";if(total&&groupCount){const base=Math.floor(total/groupCount),remainder=total%groupCount;sizeStat.textContent=remainder===0?String(base):`${base}-${base+1}`;summaryPill.textContent=`${min}番から${max}番 / ${groupCount}グループ`}else{sizeStat.textContent="-";summaryPill.textContent="設定を確認してください"}clearNotice()}function clearResult(){lastGroups=[];groupsEl.innerHTML="";groupsEl.hidden=true;emptyEl.hidden=false;exitFitMode(false)}function showNotice(message,type="ok",shake=false){notice.textContent=message;notice.className=`notice ${type}`;if(shake){notice.classList.add("shake");setTimeout(()=>notice.classList.remove("shake"),520)}}function clearNotice(){notice.textContent="";notice.className="notice"}function createGroups(min,max,groupCount){const numbers=Array.from({length:max-min+1},(_,index)=>index+min);for(let i=numbers.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[numbers[i],numbers[j]]=[numbers[j],numbers[i]]}const base=Math.floor(numbers.length/groupCount),remainder=numbers.length%groupCount;let start=0;return Array.from({length:groupCount},(_,index)=>{const size=base+(index<remainder?1:0),group=numbers.slice(start,start+size);start+=size;return group})}function display(groups){groupsEl.innerHTML="";groups.forEach((group,index)=>{const card=document.createElement("article");card.className="group-card";const head=document.createElement("div");head.className="group-head";head.innerHTML=`<div class="group-title"><span class="badge">${index+1}</span><span>グループ ${index+1}</span></div><span class="count">${group.length}人</span>`;const members=document.createElement("div");members.className="members";group.forEach(number=>{const member=document.createElement("span");member.className="member";member.textContent=number;members.appendChild(member)});card.append(head,members);groupsEl.appendChild(card)});emptyEl.hidden=true;groupsEl.hidden=false;refreshStats();fitResults()}function generate(){const err=validate();if(err){showNotice(err,"error",true);return}const{min,max}=getRange(),groupCount=parseInt(groupSelect.value,10);if(!groupCount||groupCount<2||groupCount>max-min+1){showNotice("グループ数を選んでください。","error",true);return}lastGroups=createGroups(min,max,groupCount);display(lastGroups);showNotice("グループ分けが完了しました。","ok")}function fitResults(){if(!isFitMode||groupsEl.hidden)return;groupsEl.style.transform="none";groupsEl.style.width="auto";groupsEl.style.height="auto";requestAnimationFrame(()=>{const viewport=groupsViewport.getBoundingClientRect(),content=groupsEl.getBoundingClientRect();if(!viewport.width||!viewport.height||!content.width||!content.height)return;const scale=Math.min(viewport.width/content.width,viewport.height/content.height,1);groupsEl.style.transform=`scale(${scale})`;groupsEl.style.width=`${content.width}px`;groupsEl.style.height=`${content.height*scale}px`})}async function enterFitMode(){if(!lastGroups.length){showNotice("先にグループ分けをしてください。","error",true);return}isFitMode=true;document.body.classList.add("fit-mode");try{if(document.documentElement.requestFullscreen&&!document.fullscreenElement)await document.documentElement.requestFullscreen()}catch{}fitResults()}async function exitFitMode(exitFullscreen=true){if(!isFitMode&&!document.fullscreenElement)return;isFitMode=false;document.body.classList.remove("fit-mode");groupsEl.style.transform="";groupsEl.style.width="";groupsEl.style.height="";if(exitFullscreen&&document.fullscreenElement){try{await document.exitFullscreen()}catch{}}}async function copyResult(){if(!lastGroups.length){showNotice("コピーできる結果がまだありません。","error",true);return}const text=lastGroups.map((group,index)=>`グループ ${index+1}: ${group.join(", ")}`).join("\n");try{await navigator.clipboard.writeText(text);showNotice("結果をコピーしました。","ok")}catch{showNotice("ブラウザの設定によりコピーできませんでした。","error",true)}}[minInput,maxInput].forEach(input=>{input.addEventListener("focus",()=>setActive(input));input.addEventListener("input",()=>{cleanInput(input);clearResult();refreshOptions()})});document.querySelectorAll("[data-num]").forEach(button=>{button.addEventListener("click",()=>{if(currentInput.value.length>=3){showNotice("番号は3桁まで入力できます。","error",true);return}currentInput.value=(currentInput.value+button.dataset.num).replace(/^0+(?=\d)/,"");clearResult();refreshOptions()})});document.querySelectorAll("[data-preset]").forEach(button=>{button.addEventListener("click",()=>{const[min,max]=button.dataset.preset.split(",");minInput.value=min;maxInput.value=max;setActive(minInput);clearResult();refreshOptions()})});document.getElementById("clearBtn").addEventListener("click",()=>{currentInput.value="";clearResult();refreshOptions()});document.getElementById("backBtn").addEventListener("click",()=>{currentInput.value=currentInput.value.slice(0,-1);clearResult();refreshOptions()});document.getElementById("resetBtn").addEventListener("click",()=>{minInput.value="1";maxInput.value="31";setActive(minInput);clearResult();refreshOptions();showNotice("初期値に戻しました。","ok")});document.getElementById("generateBtn").addEventListener("click",generate);document.getElementById("reshuffleBtn").addEventListener("click",generate);document.getElementById("copyBtn").addEventListener("click",copyResult);fitBtn.addEventListener("click",enterFitMode);exitFitBtn.addEventListener("click",()=>exitFitMode());document.addEventListener("fullscreenchange",()=>{if(!document.fullscreenElement&&isFitMode)exitFitMode(false)});window.addEventListener("resize",fitResults);document.getElementById("printBtn").addEventListener("click",()=>window.print());groupSelect.addEventListener("change",()=>{clearResult();refreshStats()});refreshOptions();
</script>
</body>
</html>
