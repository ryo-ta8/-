<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>総当たり対戦順メーカー</title>
<style>
:root{--bg:#f7fbff;--panel:#fff;--ink:#142033;--muted:#607086;--line:#d8e4f2;--blue:#2563eb;--green:#16a34a;--orange:#f97316;--red:#e11d48;--soft:#eff6ff;--shadow:0 18px 45px rgba(15,23,42,.12);--radius:20px}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at top left,rgba(37,99,235,.18),transparent 34%),radial-gradient(circle at bottom right,rgba(22,163,74,.16),transparent 32%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{width:min(1220px,calc(100% - 28px));margin:0 auto;padding:20px 0 34px}.hero{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:13px}.logo{width:62px;height:62px;display:grid;place-items:center;border-radius:19px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--green));box-shadow:0 14px 30px rgba(37,99,235,.25);font-size:34px}h1{margin:0;font-size:clamp(27px,4vw,44px);line-height:1.08}.lead{margin:6px 0 0;color:var(--muted);font-weight:800;line-height:1.55}.summary{min-width:min(100%,310px);padding:12px 15px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.82);box-shadow:0 9px 24px rgba(15,23,42,.08);font-weight:900}.layout{display:grid;grid-template-columns:390px minmax(0,1fr);gap:16px;align-items:start}.panel{background:rgba(255,255,255,.94);border:1px solid rgba(216,228,242,.92);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.controls{padding:16px}.section{margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}.section:first-child{margin-top:0;padding-top:0;border-top:0}.section-title{margin:0 0 11px;color:#334155;font-size:16px;font-weight:950}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:block;margin-bottom:6px;color:#475569;font-size:13px;font-weight:900}.input,.select{width:100%;min-height:52px;padding:0 12px;border:2px solid var(--line);border-radius:14px;background:#fff;color:#10233f;outline:none;font-weight:850}.input:focus,.select:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.12)}.hint{margin:8px 0 0;color:var(--muted);font-size:12px;font-weight:750;line-height:1.55}.main-btn,.sub-btn{border-radius:15px;font-weight:950;transition:transform .14s ease,box-shadow .14s ease}.main-btn{width:100%;min-height:58px;border:0;color:#fff;background:linear-gradient(135deg,var(--blue),#1d4ed8);box-shadow:0 16px 30px rgba(37,99,235,.24);font-size:18px}.sub-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.sub-btn{min-height:44px;border:1px solid var(--line);background:#f8fafc;color:#334155}.main-btn:hover,.sub-btn:hover{transform:translateY(-1px);box-shadow:0 9px 22px rgba(15,23,42,.10)}.notice{display:none;margin-top:10px;padding:10px 12px;border-radius:13px;font-size:13px;font-weight:850;line-height:1.45}.notice.error{display:block;border:1px solid #fecdd3;color:#9f1239;background:#fff1f2}.notice.ok{display:block;border:1px solid #bbf7d0;color:#047857;background:#ecfdf5}.results{min-height:610px}.result-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(248,250,252,.82)}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;flex:1}.stat .num{display:block;color:var(--blue);font-size:clamp(19px,3vw,30px);font-weight:950;line-height:1;overflow-wrap:anywhere}.stat .cap{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:850}.toolbar{display:flex;gap:7px}.icon-btn{width:42px;height:42px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:19px}.empty{min-height:480px;display:grid;place-items:center;padding:34px;text-align:center;color:var(--muted)}.empty-mark{width:88px;height:88px;display:grid;place-items:center;margin:0 auto 13px;border-radius:24px;color:var(--blue);background:var(--soft);font-size:44px}.empty h2{margin:0 0 8px;color:#334155}.output{padding:14px}.analysis-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px}.metric{padding:12px;border:1px solid var(--line);border-radius:15px;background:#f8fafc}.metric strong{display:block;margin-bottom:4px;color:#0f172a}.metric span{color:var(--muted);font-size:13px;font-weight:800}.round{border:1px solid var(--line);border-radius:17px;background:#fff;margin-bottom:11px;overflow:hidden}.round-head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:11px 13px;background:linear-gradient(135deg,#eff6ff,#f0fdf4);font-weight:950}.rest{color:#475569;font-size:12px;font-weight:850}.matches{display:grid;gap:8px;padding:11px}.match{display:grid;grid-template-columns:auto minmax(0,1fr) auto minmax(0,1fr);gap:9px;align-items:center;padding:11px;border:1px solid #e2e8f0;border-radius:13px;background:#fbfdff}.match-no{width:34px;height:34px;display:grid;place-items:center;border-radius:11px;color:#fff;background:var(--blue);font-weight:950}.team{font-weight:950;overflow-wrap:anywhere}.vs{min-width:38px;display:grid;place-items:center;padding:5px 8px;border-radius:999px;background:#fff7ed;color:var(--orange);font-size:13px;font-weight:950;text-transform:uppercase}.team-inputs{display:grid;gap:9px;margin-top:10px}.team-field{display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px;align-items:center}.team-index{width:34px;height:34px;display:grid;place-items:center;border-radius:11px;background:var(--soft);color:var(--blue);font-size:13px;font-weight:950}.team-field .input{min-height:46px}@media(max-width:940px){.app{width:min(100% - 18px,780px);padding-top:10px}.hero{align-items:flex-start;flex-direction:column}.summary{width:100%}.layout{grid-template-columns:1fr}.results{min-height:430px}}@media(max-width:560px){.brand{align-items:flex-start}.logo{width:52px;height:52px}.controls,.result-head,.output{padding:12px}.grid2,.sub-row{grid-template-columns:1fr}.result-head{align-items:stretch;flex-direction:column}.stats{grid-template-columns:1fr 1fr}.toolbar{justify-content:flex-end}.match{grid-template-columns:auto minmax(0,1fr) auto minmax(0,1fr);gap:7px;padding:9px}.match-no{width:30px;height:30px}.vs{min-width:32px;padding:4px 6px;font-size:12px}.team{font-size:14px}}@media print{body{background:#fff}.hero,.controls,.toolbar,.empty{display:none}.app{width:100%;padding:0}.layout{display:block}.panel{border:0;box-shadow:none}.round{break-inside:avoid}}
</style>
</head>
<body>
<main class="app">
<header class="hero"><div class="brand"><div class="logo" aria-hidden="true">🏟️</div><div><h1>総当たり対戦順メーカー</h1><p class="lead">参加チーム名と対戦回数を入れるだけ。休憩が偏りにくい、現実的な試合順を自動で作ります。</p></div></div><div class="summary" id="summary">4チーム / 1回ずつ / 1面</div></header>
<div class="layout">
<section class="panel controls" aria-label="設定">
<div class="section"><h2 class="section-title">基本設定</h2><div class="grid2"><div><label for="teamCount">参加チーム数</label><input id="teamCount" class="input" type="number" min="2" max="40" value="4"></div><div><label for="repeatCount">同じ相手と何回ずつ</label><select id="repeatCount" class="select"><option value="1">1試合ずつ</option><option value="2">2試合ずつ</option><option value="3">3試合ずつ</option><option value="4">4試合ずつ</option></select></div></div><div style="margin-top:10px"><label for="courtCount">同時に使うコート数</label><input id="courtCount" class="input" type="number" min="1" max="10" value="1"></div><p class="hint">コート数を増やすと、同じ時間帯に複数試合を入れます。奇数チームの場合は休憩チームを自動で作ります。</p></div>
<div class="section"><h2 class="section-title">参加チーム名</h2><label for="nameMode">チーム名テンプレート</label><select id="nameMode" class="select"><option value="custom">自分で入力する</option><option value="letters">チームA・B・C</option><option value="numbers">チーム1・2・3</option></select><div id="teamInputs" class="team-inputs" aria-label="チーム名入力欄"></div><p class="hint">1チームにつき1つの入力欄です。テンプレートを選ぶとABC形式や123形式で自動入力でき、選択後も自由に編集できます。</p></div>
<div class="section"><button class="main-btn" id="generateBtn" type="button">対戦順を作る</button><div class="sub-row"><button class="sub-btn" id="fillNamesBtn" type="button">名前を自動入力</button><button class="sub-btn" id="resetBtn" type="button">初期値に戻す</button></div><div id="notice" class="notice" role="status" aria-live="polite"></div></div>
</section>
<section class="panel results" aria-label="結果"><div class="result-head"><div class="stats"><div class="stat"><span class="num" id="teamStat">4</span><span class="cap">チーム</span></div><div class="stat"><span class="num" id="matchStat">6</span><span class="cap">総試合数</span></div><div class="stat"><span class="num" id="roundStat">6</span><span class="cap">時間帯</span></div><div class="stat"><span class="num" id="restStat">公平</span><span class="cap">休憩バランス</span></div></div><div class="toolbar"><button class="icon-btn" id="copyBtn" type="button" title="コピー">📋</button><button class="icon-btn" id="printBtn" type="button" title="印刷">🖨️</button></div></div><div id="empty" class="empty"><div><div class="empty-mark" aria-hidden="true">📋</div><h2>まだ対戦順はありません</h2><p>設定を確認して「対戦順を作る」を押してください。</p></div></div><div id="output" class="output" hidden></div></section>
</div>
</main>
<script>
const teamCountEl=document.getElementById("teamCount"),repeatCountEl=document.getElementById("repeatCount"),courtCountEl=document.getElementById("courtCount"),nameModeEl=document.getElementById("nameMode"),teamInputsEl=document.getElementById("teamInputs"),noticeEl=document.getElementById("notice"),outputEl=document.getElementById("output"),emptyEl=document.getElementById("empty"),summaryEl=document.getElementById("summary"),teamStat=document.getElementById("teamStat"),matchStat=document.getElementById("matchStat"),roundStat=document.getElementById("roundStat"),restStat=document.getElementById("restStat");let currentSchedule=null,teamNames=["チームA","チームB","チームC","チームD"];
function defaultName(index,mode=nameModeEl.value){if(mode==="numbers")return `チーム${index+1}`;return `チーム${String.fromCharCode(65+index%26)}${index>=26?Math.floor(index/26)+1:""}`}
function clamp(n,min,max){return Math.min(Math.max(n,min),max)}
function syncNamesFromInputs(){teamInputsEl.querySelectorAll("input").forEach((input,i)=>{teamNames[i]=input.value.trim()})}
function normalizedNames(){syncNamesFromInputs();const count=clamp(parseInt(teamCountEl.value,10)||2,2,40);while(teamNames.length<count)teamNames.push(defaultName(teamNames.length));return teamNames.slice(0,count).map((name,i)=>name||defaultName(i))}
function fillNames(mode=nameModeEl.value){const count=clamp(parseInt(teamCountEl.value,10)||2,2,40);if(mode==="custom"){while(teamNames.length<count)teamNames.push(defaultName(teamNames.length,"letters"));teamNames=teamNames.slice(0,count).map((name,i)=>name||defaultName(i,"letters"));}else{teamNames=Array.from({length:count},(_,i)=>defaultName(i,mode));}refresh()}
function renderTeamInputs(names){teamInputsEl.innerHTML="";names.forEach((name,i)=>{const wrap=document.createElement("label");wrap.className="team-field";const num=document.createElement("span");num.className="team-index";num.textContent=i+1;const input=document.createElement("input");input.className="input";input.type="text";input.value=name;input.placeholder=defaultName(i,nameModeEl.value==="numbers"?"numbers":"letters");input.setAttribute("aria-label",`${i+1}チーム目の名前`);input.addEventListener("input",()=>{teamNames[i]=input.value.trim();currentSchedule=null;emptyEl.hidden=false;outputEl.hidden=true;refresh(false)});wrap.append(num,input);teamInputsEl.appendChild(wrap)})}
function refresh(redrawInputs=true){syncNamesFromInputs();const names=normalizedNames(),repeat=parseInt(repeatCountEl.value,10)||1,courts=clamp(parseInt(courtCountEl.value,10)||1,1,10);teamStat.textContent=names.length;const total=names.length*(names.length-1)/2*repeat;matchStat.textContent=total;roundStat.textContent=Math.ceil(total/courts);summaryEl.textContent=`${names.length}チーム / ${repeat}回ずつ / ${courts}面`;if(redrawInputs)renderTeamInputs(names)}
function makePairQueue(teamCount,repeat){const teams=Array.from({length:teamCount},(_,i)=>i);if(teamCount%2)teams.push(-1);const n=teams.length,base=[];let ring=teams.slice();for(let r=0;r<n-1;r++){const round=[];for(let i=0;i<n/2;i++){const a=ring[i],b=ring[n-1-i];if(a!==-1&&b!==-1)round.push([a,b])}base.push(round);ring=[ring[0],ring[n-1],...ring.slice(1,n-1)]}const pairs=[];for(let rep=0;rep<repeat;rep++){const offset=rep%base.length;const ordered=base.slice(offset).concat(base.slice(0,offset));if(rep%2)ordered.reverse();ordered.forEach(round=>round.forEach(([a,b])=>pairs.push(rep%2?[b,a]:[a,b])))}return pairs}
function scoreCandidate(pair,streaks,playedCounts,roundTeams){const [a,b]=pair;if(roundTeams.has(a)||roundTeams.has(b))return Infinity;let score=(streaks[a]+1)**2+(streaks[b]+1)**2;score+=playedCounts[a]+playedCounts[b];return score}
function buildSchedule(names,repeat,courts){const pending=makePairQueue(names.length,repeat).map((pair,i)=>({pair,id:i}));const streaks=Array(names.length).fill(0),rests=Array(names.length).fill(0),played=Array(names.length).fill(0),rounds=[];let gameNo=1;while(pending.length){const round=[],roundTeams=new Set(),limit=Math.min(courts,Math.floor(names.length/2),pending.length);for(let slot=0;slot<limit;slot++){let bestIndex=-1,bestScore=Infinity;for(let i=0;i<pending.length;i++){const score=scoreCandidate(pending[i].pair,streaks,played,roundTeams);if(score<bestScore){bestScore=score;bestIndex=i}}if(bestIndex<0)break;const item=pending.splice(bestIndex,1)[0],a=item.pair[0],b=item.pair[1];round.push({no:gameNo++,a,b});roundTeams.add(a);roundTeams.add(b);played[a]++;played[b]++}for(let i=0;i<names.length;i++){if(roundTeams.has(i)){streaks[i]++;}else{streaks[i]=0;rests[i]++;}}rounds.push({matches:round,resting:names.map((_,i)=>i).filter(i=>!roundTeams.has(i))})}return {rounds,rests,played}}
function validate(){const names=normalizedNames();if(new Set(names).size!==names.length)return"同じチーム名があります。名前を変えてください。";if(names.length<2)return"2チーム以上必要です。";return""}
function render(){const err=validate();if(err){showNotice(err,"error");return}const names=normalizedNames(),repeat=parseInt(repeatCountEl.value,10)||1,courts=clamp(parseInt(courtCountEl.value,10)||1,1,10),schedule=buildSchedule(names,repeat,courts);currentSchedule={names,repeat,courts,...schedule};emptyEl.hidden=true;outputEl.hidden=false;outputEl.innerHTML="";const minRest=Math.min(...schedule.rests),maxRest=Math.max(...schedule.rests);restStat.textContent=maxRest-minRest<=1?"公平":"要確認";roundStat.textContent=schedule.rounds.length;const metrics=document.createElement("div");metrics.className="analysis-box";metrics.innerHTML=`<div class="metric"><strong>休憩回数</strong><span>最少 ${minRest}回 / 最多 ${maxRest}回</span></div><div class="metric"><strong>考え方</strong><span>連続試合が長いチームを避け、出場数が少ないチームを優先します。</span></div><div class="metric"><strong>総当たり</strong><span>全チームが全相手と${repeat}回ずつ対戦します。</span></div>`;outputEl.appendChild(metrics);schedule.rounds.forEach((round,ri)=>{const card=document.createElement("article");card.className="round";const restText=round.resting.length?`休憩: ${round.resting.map(i=>names[i]).join("、")}`:"休憩なし";card.innerHTML=`<div class="round-head"><span>第${ri+1}時間帯</span><span class="rest">${restText}</span></div>`;const matches=document.createElement("div");matches.className="matches";round.matches.forEach(m=>{const row=document.createElement("div");row.className="match";row.innerHTML=`<span class="match-no">${m.no}</span><span class="team">${names[m.a]}</span><span class="vs">vs</span><span class="team">${names[m.b]}</span>`;matches.appendChild(row)});card.appendChild(matches);outputEl.appendChild(card)});showNotice("対戦順を作成しました。","ok");refresh()}
function showNotice(msg,type){noticeEl.textContent=msg;noticeEl.className=`notice ${type}`}
function scheduleText(){if(!currentSchedule)return"";const {names,rounds,repeat,courts}=currentSchedule;return [`総当たり対戦順（${names.length}チーム・${repeat}回ずつ・${courts}面）`,...rounds.flatMap((round,i)=>[`第${i+1}時間帯 ${round.resting.length?`休憩: ${round.resting.map(t=>names[t]).join("、")}`:"休憩なし"}`,...round.matches.map(m=>`${m.no}. ${names[m.a]} vs ${names[m.b]}`)])].join("\n")}
async function copySchedule(){if(!currentSchedule){showNotice("コピーできる対戦順がまだありません。","error");return}try{await navigator.clipboard.writeText(scheduleText());showNotice("対戦順をコピーしました。","ok")}catch{showNotice("ブラウザの設定によりコピーできませんでした。","error")}}
[teamCountEl,repeatCountEl,courtCountEl].forEach(el=>el.addEventListener("input",()=>{currentSchedule=null;emptyEl.hidden=false;outputEl.hidden=true;refresh()}));nameModeEl.addEventListener("change",()=>{currentSchedule=null;emptyEl.hidden=false;outputEl.hidden=true;fillNames(nameModeEl.value)});document.getElementById("fillNamesBtn").addEventListener("click",()=>fillNames(nameModeEl.value));document.getElementById("resetBtn").addEventListener("click",()=>{teamCountEl.value=4;repeatCountEl.value=1;courtCountEl.value=1;nameModeEl.value="letters";teamNames=["チームA","チームB","チームC","チームD"];refresh();showNotice("初期値に戻しました。","ok")});document.getElementById("generateBtn").addEventListener("click",render);document.getElementById("copyBtn").addEventListener("click",copySchedule);document.getElementById("printBtn").addEventListener("click",()=>window.print());refresh();
</script>
</body>
</html>
