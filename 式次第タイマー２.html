<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズアプリ</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(120deg, #eef5ff, #f7fbff);
      min-height: 100vh;
      padding: 32px 0;
    }
    .quiz-card {
      max-width: 760px;
      margin: 0 auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      border: none;
      border-radius: 14px;
    }
    .choice-btn {
      text-align: left;
      white-space: normal;
    }
    .result-item {
      border-left: 4px solid #007bff;
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .correct {
      border-left-color: #28a745;
    }
    .incorrect {
      border-left-color: #dc3545;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card quiz-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 text-center mb-2">クイズアプリ</h1>
        <p class="text-muted text-center mb-4">全5問の4択クイズです。気軽にチャレンジしてください！</p>

        <div id="quizHeader" class="d-flex justify-content-between align-items-center mb-3">
          <span id="progressLabel" class="badge badge-primary p-2">問題 1 / 5</span>
          <span id="scoreLabel" class="badge badge-info p-2">スコア: 0</span>
        </div>

        <div id="quizArea">
          <h2 id="questionText" class="h5 mb-4"></h2>
          <div id="choicesArea" class="list-group mb-3"></div>
          <div id="feedback" class="font-weight-bold"></div>
          <button id="nextBtn" class="btn btn-primary mt-3" disabled>次の問題へ</button>
        </div>

        <div id="resultArea" class="d-none">
          <h2 class="h4 mb-3">結果発表</h2>
          <p id="finalScore" class="lead mb-4"></p>
          <div id="answerReview" class="mb-4"></div>
          <button id="restartBtn" class="btn btn-success">もう一度挑戦する</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: '日本の首都はどこですか？',
        choices: ['大阪', '東京', '名古屋', '福岡'],
        answerIndex: 1
      },
      {
        question: 'HTMLの正式名称として正しいものはどれですか？',
        choices: [
          'Hyper Text Markup Language',
          'High Transfer Machine Language',
          'Hyperlink and Text Managing Language',
          'Home Tool Markup Language'
        ],
        answerIndex: 0
      },
      {
        question: '1バイトは何ビットですか？',
        choices: ['4ビット', '8ビット', '16ビット', '32ビット'],
        answerIndex: 1
      },
      {
        question: 'JavaScriptで配列の末尾に要素を追加するメソッドはどれですか？',
        choices: ['append()', 'add()', 'push()', 'insert()'],
        answerIndex: 2
      },
      {
        question: '地球は太陽のまわりを何日ほどで1周しますか？',
        choices: ['約30日', '約180日', '約365日', '約730日'],
        answerIndex: 2
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedChoiceIndex = null;
    let answerLogs = [];

    const progressLabel = document.getElementById('progressLabel');
    const scoreLabel = document.getElementById('scoreLabel');
    const questionText = document.getElementById('questionText');
    const choicesArea = document.getElementById('choicesArea');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const finalScore = document.getElementById('finalScore');
    const answerReview = document.getElementById('answerReview');
    const restartBtn = document.getElementById('restartBtn');

    function renderQuestion() {
      const current = quizData[currentQuestionIndex];
      progressLabel.textContent = `問題 ${currentQuestionIndex + 1} / ${quizData.length}`;
      scoreLabel.textContent = `スコア: ${score}`;
      questionText.textContent = current.question;
      choicesArea.innerHTML = '';
      feedback.textContent = '';
      feedback.className = 'font-weight-bold';
      nextBtn.disabled = true;
      selectedChoiceIndex = null;

      current.choices.forEach((choice, index) => {
        const button = document.createElement('button');
        button.className = 'list-group-item list-group-item-action choice-btn';
        button.textContent = `${index + 1}. ${choice}`;
        button.type = 'button';
        button.addEventListener('click', () => selectChoice(index));
        choicesArea.appendChild(button);
      });
    }

    function selectChoice(index) {
      if (selectedChoiceIndex !== null) return;

      selectedChoiceIndex = index;
      const current = quizData[currentQuestionIndex];
      const buttons = [...choicesArea.querySelectorAll('button')];
      const isCorrect = index === current.answerIndex;

      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === current.answerIndex) {
          btn.classList.add('list-group-item-success');
        }
        if (i === index && !isCorrect) {
          btn.classList.add('list-group-item-danger');
        }
      });

      if (isCorrect) {
        score += 1;
        feedback.textContent = '正解です！';
        feedback.classList.add('text-success');
      } else {
        feedback.textContent = `不正解です。正解は「${current.choices[current.answerIndex]}」です。`;
        feedback.classList.add('text-danger');
      }

      answerLogs.push({
        question: current.question,
        selected: current.choices[index],
        correct: current.choices[current.answerIndex],
        isCorrect
      });

      scoreLabel.textContent = `スコア: ${score}`;
      nextBtn.disabled = false;
    }

    function showResult() {
      quizArea.classList.add('d-none');
      resultArea.classList.remove('d-none');
      finalScore.textContent = `あなたのスコアは ${quizData.length} 問中 ${score} 点です。`;

      answerReview.innerHTML = answerLogs.map((item, idx) => `
        <div class="result-item ${item.isCorrect ? 'correct' : 'incorrect'}">
          <div class="font-weight-bold">Q${idx + 1}. ${item.question}</div>
          <div>あなたの回答: ${item.selected}</div>
          <div>正解: ${item.correct}</div>
        </div>
      `).join('');
    }

    function goNext() {
      if (selectedChoiceIndex === null) return;
      if (currentQuestionIndex < quizData.length - 1) {
        currentQuestionIndex += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      selectedChoiceIndex = null;
      answerLogs = [];
      resultArea.classList.add('d-none');
      quizArea.classList.remove('d-none');
      renderQuestion();
    }

    nextBtn.addEventListener('click', goNext);
    restartBtn.addEventListener('click', restartQuiz);

    renderQuestion();
  </script>
</body>
</html>
