<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>給食当番 準備タイマー</title>
  <style>
    :root {
      --bg: #fff7ed;
      --surface: #ffffff;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #fed7aa;
      --orange: #f97316;
      --orange-dark: #c2410c;
      --green: #16a34a;
      --green-soft: #dcfce7;
      --blue: #2563eb;
      --red: #e11d48;
      --shadow: 0 18px 45px rgba(124, 45, 18, .14);
      --radius: 22px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(251, 146, 60, .34), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, .22), transparent 30%),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: calc(22px + var(--safe-top)) var(--safe-right) calc(32px + var(--safe-bottom)) var(--safe-left);
    }

    body.fullscreen-fallback {
      overflow: hidden;
    }

    body.fullscreen-fallback .app {
      position: fixed;
      inset: 0;
      z-index: 10;
      width: 100%;
      max-width: none;
      overflow: auto;
      overscroll-behavior: contain;
      padding: calc(12px + var(--safe-top)) calc(12px + var(--safe-right)) calc(18px + var(--safe-bottom)) calc(12px + var(--safe-left));
      background:
        radial-gradient(circle at top left, rgba(251, 146, 60, .34), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, .22), transparent 30%),
        var(--bg);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .title-card,
    .timer-card,
    .panel {
      background: rgba(255, 255, 255, .94);
      border: 2px solid rgba(254, 215, 170, .88);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .title-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px;
    }

    .logo {
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 20px;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), #facc15);
      box-shadow: 0 12px 28px rgba(249, 115, 22, .25);
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 4vw, 44px);
      line-height: 1.05;
    }

    .lead {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 800;
      line-height: 1.5;
    }

    .timer-card {
      min-width: min(100%, 330px);
      padding: 16px 18px;
      text-align: center;
    }

    .timer-label {
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .08em;
    }

    .timer {
      margin-top: 4px;
      color: var(--orange-dark);
      font-size: clamp(48px, 8vw, 76px);
      font-variant-numeric: tabular-nums;
      font-weight: 950;
      line-height: 1;
    }

    .status {
      margin-top: 8px;
      min-height: 28px;
      color: #334155;
      font-weight: 900;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .control-btn {
      min-height: 56px;
      border: 0;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      box-shadow: 0 12px 24px rgba(249, 115, 22, .20);
      font-weight: 950;
      transition: transform .14s ease, box-shadow .14s ease;
    }

    .control-btn.secondary {
      color: #7c2d12;
      background: #fff7ed;
      border: 2px solid var(--line);
      box-shadow: none;
    }

    .control-btn.good {
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .control-btn.back {
      background: linear-gradient(135deg, #64748b, #334155);
    }

    .fullscreen-note {
      margin: -6px 0 14px;
      min-height: 24px;
      color: #7c2d12;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.5;
    }

    .control-btn:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .control-btn:not(:disabled):hover,
    .task-btn:hover,
    .small-btn:hover { transform: translateY(-2px); }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel { overflow: hidden; }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 15px 17px;
      border-bottom: 2px solid var(--line);
      background: rgba(255, 247, 237, .76);
    }

    .panel-title {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.2;
    }

    .counter {
      min-width: 72px;
      padding: 8px 12px;
      border-radius: 999px;
      text-align: center;
      color: #fff;
      background: var(--orange);
      font-size: 20px;
      font-weight: 950;
    }

    .done .counter { background: var(--green); }

    .task-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      min-height: 330px;
      padding: 16px;
    }

    .task-btn {
      min-height: 92px;
      border: 3px solid #fdba74;
      border-radius: 20px;
      background: #fff;
      color: #7c2d12;
      box-shadow: 0 10px 22px rgba(124, 45, 18, .10);
      font-size: clamp(18px, 2.4vw, 26px);
      font-weight: 950;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .task-btn.done-task {
      border-color: #86efac;
      color: #14532d;
      background: var(--green-soft);
    }

    .task-btn small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .settings {
      margin-top: 16px;
      padding: 16px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(320px, 2fr);
      gap: 16px;
      align-items: start;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #7c2d12;
      font-weight: 950;
    }

    input {
      width: 100%;
      min-height: 52px;
      padding: 10px 12px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      font-size: 18px;
      font-weight: 850;
      outline: none;
    }

    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, .16);
    }

    .setting-label-spaced {
      margin-top: 14px;
    }

    .task-editor {
      display: grid;
      gap: 10px;
    }

    .task-editor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }

    .task-editor-head label { margin-bottom: 0; }

    .task-editor-help {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .task-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 2px solid rgba(254, 215, 170, .72);
      border-radius: 18px;
      background: #fffaf5;
    }

    .task-row input { min-height: 48px; }

    .small-btn,
    .icon-btn {
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      color: #fff;
      background: var(--blue);
      font-weight: 950;
    }

    .icon-btn {
      min-width: 52px;
      padding: 0 14px;
      background: var(--red);
      font-size: 20px;
    }

    .add-btn {
      background: var(--green);
      white-space: nowrap;
    }

    .apply-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .message {
      margin-top: 12px;
      min-height: 28px;
      color: var(--red);
      font-weight: 900;
    }

    .celebrate {
      animation: pop .6s ease both;
    }

    @keyframes pop {
      0% { transform: scale(.96); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (max-width: 900px) {
      .hero,
      .board,
      .settings-grid { grid-template-columns: 1fr; }
      .timer-card { min-width: 0; }
      .controls { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 540px) {
      .app { width: min(100% - 18px, 760px); padding-top: 10px; }
      .title-card { align-items: flex-start; }
      .logo { width: 54px; height: 54px; font-size: 28px; }
      .controls { grid-template-columns: 1fr; }
      .task-list { grid-template-columns: 1fr; min-height: 220px; }
      .task-editor-head { align-items: stretch; flex-direction: column; }
      .apply-row { display: block; }
      .apply-row .small-btn,
      .add-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-label="給食当番タイマーの概要">
      <div class="title-card">
        <div class="logo" aria-hidden="true">🍚</div>
        <div>
          <h1>給食当番 準備タイマー</h1>
          <p class="lead">係のボタンを押すと「準備完了」へ移動します。タイマー中は1分ごとに急かす音でお知らせし、設定した時間からカウントダウンします。</p>
          <p class="lead"><a href="quiz.html">わいわい4択クイズを開く</a></p>
        </div>
      </div>
      <div class="timer-card" aria-live="polite">
        <div class="timer-label">残り時間</div>
        <div id="timer" class="timer">00:00</div>
        <div id="status" class="status">スタートを押して開始</div>
      </div>
    </section>

    <section class="controls" aria-label="タイマー操作">
      <button id="backBtn" class="control-btn back" type="button">戻る</button>
      <button id="fullscreenBtn" class="control-btn" type="button" aria-pressed="false">全画面表示</button>
      <button id="startBtn" class="control-btn" type="button">スタート</button>
      <button id="pauseBtn" class="control-btn secondary" type="button" disabled>一時停止</button>
      <button id="soundBtn" class="control-btn secondary" type="button">音を試す</button>
      <button id="resetBtn" class="control-btn good" type="button">リセット</button>
    </section>
    <div id="fullscreenNote" class="fullscreen-note" role="status" aria-live="polite"></div>

    <section class="board" aria-label="係の準備状況">
      <div class="panel waiting">
        <div class="panel-head">
          <h2 class="panel-title">まだの係</h2>
          <div id="waitingCount" class="counter">0</div>
        </div>
        <div id="waitingList" class="task-list" aria-live="polite"></div>
      </div>
      <div class="panel done">
        <div class="panel-head">
          <h2 class="panel-title">準備完了</h2>
          <div id="doneCount" class="counter">0</div>
        </div>
        <div id="doneList" class="task-list" aria-live="polite"></div>
      </div>
    </section>

    <section class="panel settings" aria-label="係の設定">
      <div class="settings-grid">
        <div>
          <label for="durationInput">準備時間（分）</label>
          <input id="durationInput" type="number" min="1" max="60" value="5" />
          <label for="minuteInput" class="setting-label-spaced">急かす音の間隔（分）</label>
          <input id="minuteInput" type="number" min="1" max="10" value="1" />
        </div>
        <div class="task-editor">
          <div class="task-editor-head">
            <label id="taskListLabel">係の名前</label>
            <button id="addTaskBtn" class="small-btn add-btn" type="button">＋ 係を追加</button>
          </div>
          <p class="task-editor-help">1つの枠に1つの係を書きます。変更したい枠を直接直して、いらない係は削除できます。</p>
          <div id="taskEditor" aria-labelledby="taskListLabel"></div>
          <div class="apply-row">
            <button id="applyBtn" class="small-btn" type="button">係を更新</button>
          </div>
        </div>
      </div>
      <div id="message" class="message" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");
    const waitingList = document.getElementById("waitingList");
    const doneList = document.getElementById("doneList");
    const waitingCount = document.getElementById("waitingCount");
    const doneCount = document.getElementById("doneCount");
    const backBtn = document.getElementById("backBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const fullscreenNote = document.getElementById("fullscreenNote");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const soundBtn = document.getElementById("soundBtn");
    const applyBtn = document.getElementById("applyBtn");
    const addTaskBtn = document.getElementById("addTaskBtn");
    const taskEditor = document.getElementById("taskEditor");
    const minuteInput = document.getElementById("minuteInput");
    const durationInput = document.getElementById("durationInput");
    const message = document.getElementById("message");

    let tasks = [];
    let done = new Set();
    let startedAt = 0;
    let elapsedBeforePause = 0;
    let timerId = null;
    let nextChimeAt = 60;
    let finished = false;
    let audioContext = null;

    const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    const defaultTasks = ["配膳台", "食器", "ごはん", "おかず", "牛乳", "ストロー", "いただきます係"];


    function isFullscreen() {
      return Boolean(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function updateFullscreenControls() {
      const active = isFullscreen() || document.body.classList.contains("fullscreen-fallback");
      fullscreenBtn.textContent = active ? "全画面を終了" : "全画面表示";
      fullscreenBtn.setAttribute("aria-pressed", String(active));
    }

    async function enterFullscreen() {
      const target = document.documentElement;
      const request = target.requestFullscreen || target.webkitRequestFullscreen;

      if (request) {
        try {
          await request.call(target);
          fullscreenNote.textContent = "全画面表示にしました。戻るボタンまたはEscで終了できます。";
          updateFullscreenControls();
          return;
        } catch (error) {
          console.warn("Fullscreen request failed:", error);
        }
      }

      document.body.classList.add("fullscreen-fallback");
      window.scrollTo(0, 0);
      fullscreenNote.textContent = isIos
        ? "iPhone/iPadでブラウザが全画面を許可しない場合は、画面内だけを大きく表示します。共有からホーム画面に追加すると、より全画面に近く使えます。"
        : "このブラウザでは全画面APIが使えないため、画面内を大きく表示しています。";
      updateFullscreenControls();
    }

    async function exitFullscreenMode() {
      if (isFullscreen()) {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) await exit.call(document);
      }
      document.body.classList.remove("fullscreen-fallback");
      fullscreenNote.textContent = "全画面表示を終了しました。";
      updateFullscreenControls();
    }

    function toggleFullscreen() {
      if (isFullscreen() || document.body.classList.contains("fullscreen-fallback")) {
        exitFullscreenMode();
      } else {
        enterFullscreen();
      }
    }

    function goBack() {
      if (isFullscreen() || document.body.classList.contains("fullscreen-fallback")) {
        exitFullscreenMode();
        return;
      }
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "./";
      }
    }

    function getEditorTasks() {
      return [...taskEditor.querySelectorAll("input")]
        .map((input) => input.value.trim())
        .filter(Boolean);
    }

    function createTaskRow(value = "") {
      const row = document.createElement("div");
      row.className = "task-row";

      const input = document.createElement("input");
      input.type = "text";
      input.value = value;
      input.placeholder = "係の名前";
      input.setAttribute("aria-label", "係の名前");

      const deleteButton = document.createElement("button");
      deleteButton.type = "button";
      deleteButton.className = "icon-btn";
      deleteButton.textContent = "×";
      deleteButton.setAttribute("aria-label", `${value || "この係"}を削除`);
      deleteButton.addEventListener("click", () => {
        row.remove();
        message.textContent = "係を削除しました。最後に「係を更新」を押してください。";
        if (!taskEditor.children.length) addTaskRow();
      });

      input.addEventListener("input", () => {
        deleteButton.setAttribute("aria-label", `${input.value.trim() || "この係"}を削除`);
      });

      row.append(input, deleteButton);
      return row;
    }

    function addTaskRow(value = "") {
      const row = createTaskRow(value);
      taskEditor.appendChild(row);
      row.querySelector("input").focus();
    }

    function renderTaskEditor(taskNames) {
      taskEditor.innerHTML = "";
      taskNames.forEach((task) => taskEditor.appendChild(createTaskRow(task)));
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
      const seconds = (totalSeconds % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function getElapsedSeconds() {
      if (!timerId) return Math.floor(elapsedBeforePause / 1000);
      return Math.floor((Date.now() - startedAt + elapsedBeforePause) / 1000);
    }

    function getIntervalSeconds() {
      const minutes = Number.parseInt(minuteInput.value, 10);
      return Math.max(1, Number.isNaN(minutes) ? 1 : minutes) * 60;
    }

    function getDurationSeconds() {
      const minutes = Number.parseInt(durationInput.value, 10);
      return Math.max(1, Number.isNaN(minutes) ? 5 : minutes) * 60;
    }

    function getRemainingSeconds() {
      return Math.max(0, getDurationSeconds() - getElapsedSeconds());
    }

    function beep() {
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      const soundLength = 5;
      for (let offset = 0; offset < soundLength; offset += .22) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(Math.floor(offset / .22) % 2 ? 880 : 660, now + offset);
        gain.gain.setValueAtTime(.0001, now + offset);
        gain.gain.exponentialRampToValueAtTime(.20, now + offset + .03);
        gain.gain.exponentialRampToValueAtTime(.0001, now + Math.min(offset + .16, soundLength));
        oscillator.connect(gain).connect(audioContext.destination);
        oscillator.start(now + offset);
        oscillator.stop(now + Math.min(offset + .18, soundLength));
      }
    }

    function render() {
      waitingList.innerHTML = "";
      doneList.innerHTML = "";

      tasks.forEach((task) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `task-btn${done.has(task) ? " done-task" : ""}`;
        button.innerHTML = `${task}<small>${done.has(task) ? "押すと戻ります" : "押すと完了へ"}</small>`;
        button.addEventListener("click", () => toggleTask(task));
        (done.has(task) ? doneList : waitingList).appendChild(button);
      });

      waitingCount.textContent = String(tasks.length - done.size);
      doneCount.textContent = String(done.size);

      if (tasks.length && done.size === tasks.length) {
        statusEl.textContent = `全員完了！ 残り ${formatTime(getRemainingSeconds())}`;
        doneList.classList.add("celebrate");
        window.setTimeout(() => doneList.classList.remove("celebrate"), 650);
      }
    }

    function toggleTask(task) {
      if (done.has(task)) done.delete(task);
      else done.add(task);
      render();
    }

    function tick() {
      const elapsed = getElapsedSeconds();
      const remaining = getRemainingSeconds();
      timerEl.textContent = formatTime(remaining);

      if (remaining <= 0) {
        if (!finished) {
          finished = true;
          beep();
          statusEl.textContent = "時間です！準備を終わりましょう。";
        }
        if (timerId) {
          window.clearInterval(timerId);
          timerId = null;
          startBtn.disabled = false;
          pauseBtn.disabled = true;
        }
        return;
      }

      if (elapsed >= nextChimeAt) {
        beep();
        statusEl.textContent = `残り${formatTime(remaining)}です。急いで準備しよう！`;
        nextChimeAt += getIntervalSeconds();
      }
    }

    function startTimer() {
      if (timerId) return;
      if (getRemainingSeconds() <= 0) {
        elapsedBeforePause = 0;
        nextChimeAt = getIntervalSeconds();
      }
      startedAt = Date.now();
      finished = false;
      nextChimeAt = Math.max(nextChimeAt, getIntervalSeconds());
      timerId = window.setInterval(tick, 250);
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      statusEl.textContent = "準備中です";
      tick();
    }

    function pauseTimer() {
      if (!timerId) return;
      elapsedBeforePause += Date.now() - startedAt;
      window.clearInterval(timerId);
      timerId = null;
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      statusEl.textContent = "一時停止中";
      tick();
    }

    function resetAll() {
      if (timerId) window.clearInterval(timerId);
      timerId = null;
      startedAt = 0;
      elapsedBeforePause = 0;
      nextChimeAt = getIntervalSeconds();
      finished = false;
      done = new Set();
      timerEl.textContent = formatTime(getDurationSeconds());
      statusEl.textContent = "スタートを押して開始";
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      render();
    }

    function applyTasks() {
      const nextTasks = getEditorTasks();
      if (!nextTasks.length) {
        message.textContent = "係の名前を1つ以上入力してください。";
        return;
      }
      const uniqueTasks = [...new Set(nextTasks)];
      tasks = uniqueTasks;
      done = new Set([...done].filter((task) => uniqueTasks.includes(task)));
      renderTaskEditor(uniqueTasks);
      message.textContent = "係を更新しました。";
      render();
    }

    backBtn.addEventListener("click", goBack);
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", updateFullscreenControls);
    document.addEventListener("webkitfullscreenchange", updateFullscreenControls);
    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", pauseTimer);
    resetBtn.addEventListener("click", resetAll);
    soundBtn.addEventListener("click", () => {
      beep();
      message.textContent = "この音が約5秒間流れます。";
    });
    applyBtn.addEventListener("click", applyTasks);
    addTaskBtn.addEventListener("click", () => {
      addTaskRow();
      message.textContent = "新しい係を追加しました。名前を書いて「係を更新」を押してください。";
    });
    minuteInput.addEventListener("change", () => {
      nextChimeAt = Math.max(getElapsedSeconds() + getIntervalSeconds(), getIntervalSeconds());
      message.textContent = "音の間隔を更新しました。";
    });
    durationInput.addEventListener("change", () => {
      if (!timerId) timerEl.textContent = formatTime(getRemainingSeconds());
      finished = getRemainingSeconds() <= 0;
      message.textContent = "準備時間を更新しました。";
    });

    tasks = [...defaultTasks];
    renderTaskEditor(tasks);
    resetAll();
    updateFullscreenControls();
  </script>
</body>
</html>
