<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>式次第タイマー</title><style>
:root{--bg:#f4f7fb;--card:#fff;--soft:#f8fafc;--text:#172033;--muted:#64748b;--line:#dbe3ef;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#f59e0b;--shadow:0 14px 36px rgba(15,23,42,.1)}*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(37,99,235,.16),transparent 34%),linear-gradient(#f8fbff,var(--bg))}.app{width:min(1120px,calc(100% - 28px));margin:84px auto 40px}.top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow)}h1{margin:0;font-size:clamp(1.5rem,3vw,2.2rem)}.note{margin:6px 0 0;color:var(--muted);line-height:1.65}.panel{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.hd{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 18px;background:linear-gradient(#fff,#f8fafc);border-bottom:1px solid var(--line)}.bd{padding:18px}.grid{display:grid;grid-template-columns:1.4fr .55fr .8fr;gap:14px;align-items:end}label{display:block;font-weight:800;color:#334155;margin-bottom:7px}input[type=text],input[type=number]{width:100%;min-height:48px;padding:10px 13px;border:1px solid #cbd5e1;border-radius:14px;font:inherit}.toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px;margin:0;padding:9px 12px;border:1px solid #cbd5e1;border-radius:14px;background:#fff;font-weight:800}.toggle input{width:20px;height:20px;accent-color:var(--blue)}.btn{border:0;border-radius:14px;min-height:46px;padding:10px 14px;font:inherit;font-weight:900;cursor:pointer;color:#fff;background:#64748b;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;white-space:nowrap;touch-action:manipulation}.btn:disabled{opacity:.45;cursor:not-allowed}.blue{background:var(--blue)}.green{background:var(--green)}.red{background:var(--red)}.orange{background:var(--orange);color:#111827}.light{background:#eef2f7;color:#334155;border:1px solid #d8e1ee}.full{width:100%}.new{position:fixed;z-index:40;top:14px;right:14px;box-shadow:0 12px 24px rgba(15,23,42,.16)}.screen{display:none}.screen.on{display:block}.help{margin-top:12px;border:1px dashed #cbd5e1;border-radius:14px;padding:12px;background:#f8fafc;color:var(--muted);line-height:1.7}.names{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.namecard{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:12px}.namehead{font-weight:900;color:var(--muted);margin-bottom:8px}.timerTop{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:16px}.now{min-height:210px;border-radius:22px;padding:22px;color:#fff;background:linear-gradient(135deg,#1d4ed8,#2563eb 45%,#0f766e);box-shadow:var(--shadow)}.badge{display:inline-flex;gap:8px;align-items:center;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.16);font-weight:900}.dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1}.dot.run{background:#86efac;box-shadow:0 0 0 6px rgba(134,239,172,.2)}.event{margin-top:14px;font-weight:950;font-size:clamp(1.2rem,2.5vw,2rem)}.cur{margin-top:8px;font-weight:950;font-size:clamp(1.6rem,4vw,3.2rem);word-break:break-word}.elapsed{margin-top:14px;font-weight:950;font-variant-numeric:tabular-nums;font-size:clamp(2rem,7vw,4.5rem)}.side{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.sideBtns{display:grid;gap:10px;margin-top:12px}.small{color:var(--muted);line-height:1.65}.tableWrap{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}table{width:100%;border-collapse:separate;border-spacing:0;table-layout:auto}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}th{background:#f8fafc;color:#334155}.num{width:58px;text-align:center;font-weight:950;color:#475569}.nm{min-width:180px;font-weight:900;word-break:break-word}.tm{width:100px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}.dur{width:116px;font-weight:950;font-variant-numeric:tabular-nums;white-space:nowrap}.act{min-width:220px;display:flex;gap:8px;flex-wrap:wrap}.rowbtn{min-height:38px;padding:8px 11px;border-radius:12px;font-size:.92rem}tr.run{background:#eff6ff}tr.done{background:#f0fdf4}.cards{display:none}.itemCard{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.06);margin-bottom:12px}.itemHead{display:flex;justify-content:space-between;gap:8px;font-weight:950}.kv{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.kv div{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:8px}.kv span{display:block;color:var(--muted);font-size:.78rem;font-weight:800}.kv b{font-variant-numeric:tabular-nums}.cardBtns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.foot{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:10px;margin-top:14px}.msg{margin-top:10px;color:var(--muted);line-height:1.6}.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(15,23,42,.52)}.modal.on{display:flex}.modalCard{width:min(430px,100%);background:#fff;border-radius:22px;padding:20px;box-shadow:0 24px 70px rgba(15,23,42,.28)}.modalCard h2{margin:0 0 10px}.modalCard p{white-space:pre-line;color:#475569;line-height:1.7}.modalBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}@media(max-width:760px){.app{width:100%;margin:72px 0 24px;padding:0 10px}.new{top:8px;left:10px;right:10px;width:calc(100% - 20px)}.top{grid-template-columns:1fr;padding:16px}.grid,.timerTop{grid-template-columns:1fr}.tableWrap{display:none}.cards{display:block}.cardBtns{grid-template-columns:1fr}.kv{grid-template-columns:1fr 1fr}.btn{width:100%;white-space:normal}.foot{display:grid}.hd{align-items:flex-start;flex-direction:column}.panel{border-radius:18px}}@media print{body{background:#fff}.new,.top,.screen:not(#timer),.side,.foot,.modal{display:none!important}.app{width:100%;margin:0}.panel{box-shadow:none;border:0;margin:0}.hd{border:0;padding:0 0 12px}.bd{padding:0}.timerTop{display:none}.tableWrap{display:block;border:0}.cards{display:none}th,td{border:1px solid #94a3b8;padding:7px}th{background:#e2e8f0}.act{display:none}.screen{display:none}.screen.on{display:block}@page{size:A4;margin:12mm}}
</style></head><body><button id="newBtn" class="btn light new">新規作成</button><main class="app"><header class="top"><div><h1>式次第タイマー</h1><p class="note">タイトルと項目数を決め、項目名を入力して、各項目の開始・停止を記録します。</p></div><label class="toggle">秒表示<input id="sec1" type="checkbox"></label></header>
<section id="setup" class="screen on panel"><div class="hd"><h2>最初の設定</h2></div><div class="bd"><div class="grid"><div><label for="title">タイトル</label><input id="title" type="text" value="式次第" placeholder="例：卒業証書授与式"></div><div><label for="count">項目数</label><input id="count" type="number" min="1" max="80" value="10"></div><label class="toggle">秒表示<input id="sec2" type="checkbox"></label></div><p class="help">秒表示はあとからでも切り替えできます。内部では常に秒まで記録します。</p><p><button id="makeBtn" class="btn blue full">項目名を入力する</button></p><div id="msg" class="msg"></div></div></section>
<section id="names" class="screen panel"><div class="hd"><h2>項目名の入力</h2><button id="backSetup" class="btn light">設定に戻る</button></div><div class="bd"><div id="namesArea" class="names"></div><div class="foot"><button id="startBtn" class="btn blue">計測画面へ</button></div></div></section>
<section id="timer" class="screen"><div class="timerTop"><section class="now"><div class="badge"><span id="dot" class="dot"></span><span id="status">待機中</span></div><div id="viewTitle" class="event">式次第</div><div id="curName" class="cur">項目を開始してください</div><div id="curElapsed" class="elapsed">0分</div></section><aside class="side"><label class="toggle">秒表示<input id="sec3" type="checkbox"></label><div class="sideBtns"><button id="nextBtn" class="btn orange">停止して次へ</button><button id="printBtn" class="btn green">印刷ページを開く</button><button id="editBtn" class="btn light">項目名を編集</button></div><p class="small">リセットは項目ごとです。すべて消して最初から作る場合は、上の「新規作成」を使います。</p></aside></div><section class="panel"><div class="hd"><h2 id="tableTitle">式次記録</h2><span class="small" id="saveLabel">自動保存</span></div><div class="bd"><div class="tableWrap"><table><thead><tr><th class="num">No</th><th>項目名</th><th>開始</th><th>終了</th><th>所要時間</th><th class="act">操作</th></tr></thead><tbody id="rows"></tbody></table></div><div id="cards" class="cards"></div><div class="foot"><button id="printBtn2" class="btn green">印刷ページを開く</button></div></div></section></section></main>
<div id="modal" class="modal" aria-hidden="true"><div class="modalCard"><h2 id="mTitle">確認</h2><p id="mText">実行しますか？</p><div class="modalBtns"><button id="mNo" class="btn light">いいえ</button><button id="mOk" class="btn red">OK</button></div></div></div>
<script>
const KEY='shikijidai_timer_final_v2';
const $=id=>document.getElementById(id);let pending=null;
const els={newBtn:$('newBtn'),setup:$('setup'),names:$('names'),timer:$('timer'),title:$('title'),count:$('count'),sec1:$('sec1'),sec2:$('sec2'),sec3:$('sec3'),makeBtn:$('makeBtn'),msg:$('msg'),namesArea:$('namesArea'),backSetup:$('backSetup'),startBtn:$('startBtn'),viewTitle:$('viewTitle'),curName:$('curName'),curElapsed:$('curElapsed'),dot:$('dot'),status:$('status'),nextBtn:$('nextBtn'),printBtn:$('printBtn'),printBtn2:$('printBtn2'),editBtn:$('editBtn'),tableTitle:$('tableTitle'),rows:$('rows'),cards:$('cards'),saveLabel:$('saveLabel'),modal:$('modal'),mTitle:$('mTitle'),mText:$('mText'),mNo:$('mNo'),mOk:$('mOk')};
let state={title:'式次第',showSec:false,items:[]};
const now=()=>Date.now(),pad=n=>String(n).padStart(2,'0'),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function show(id){['setup','names','timer'].forEach(x=>els[x].classList.toggle('on',x===id));}
function msg(t){els.msg.textContent=t||'';}
function fmtTime(ms){if(!ms)return'-';const d=new Date(ms);return state.showSec?`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`:`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function elapsed(it){return (it.elapsed||0)+(it.running&&it.started?now()-it.started:0)}
function fmtDur(ms){let s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60;return state.showSec?`${m}分${pad(r)}秒`:`${m}分`;}
function syncSec(v){state.showSec=!!v;els.sec1.checked=els.sec2.checked=els.sec3.checked=state.showSec;renderTimer();save();}
function makeInputs(){const title=els.title.value.trim(),n=Number(els.count.value);if(!title){msg('タイトルを入力してください。');els.title.focus();return}if(!Number.isInteger(n)||n<1||n>80){msg('項目数は1〜80で入力してください。');els.count.focus();return}state.title=title;state.showSec=els.sec2.checked;state.items=Array.from({length:n},(_,i)=>state.items[i]||{id:i+1,name:`項目${i+1}`,first:null,stop:null,started:null,elapsed:0,running:false});state.items=state.items.slice(0,n).map((it,i)=>({...it,id:i+1}));renderNames();show('names');msg('');save();}
function renderNames(){els.namesArea.innerHTML=state.items.map(it=>`<div class="namecard"><div class="namehead">${it.id}. 項目名</div><input data-name="${it.id}" type="text" value="${esc(it.name)}" placeholder="項目名"></div>`).join('');}
function applyNames(){const inputs=[...els.namesArea.querySelectorAll('[data-name]')];for(const input of inputs){if(!input.value.trim()){alert(`${input.dataset.name}番の項目名を入力してください。`);input.focus();return}state.items[Number(input.dataset.name)-1].name=input.value.trim()}renderTimer();show('timer');save();}
function renderTimer(){els.sec1.checked=els.sec2.checked=els.sec3.checked=state.showSec;els.viewTitle.textContent=state.title||'式次第';els.tableTitle.textContent=(state.title||'式次第')+' 記録';els.rows.innerHTML=state.items.map(rowHtml).join('');els.cards.innerHTML=state.items.map(cardHtml).join('');tick();}
function cls(it){return it.running?'run':(it.stop?'done':'')}
function rowHtml(it){return `<tr id="r${it.id}" class="${cls(it)}"><td class="num">${it.id}</td><td class="nm">${esc(it.name)}</td><td class="tm" data-start="${it.id}">${fmtTime(it.first)}</td><td class="tm" data-stop="${it.id}">${it.running?'計測中':fmtTime(it.stop)}</td><td class="dur" data-dur="${it.id}">${fmtDur(elapsed(it))}</td><td class="act"><button class="btn green rowbtn" data-a="start" data-id="${it.id}">開始／再開</button><button class="btn red rowbtn" data-a="stop" data-id="${it.id}">停止</button><button class="btn light rowbtn" data-a="reset" data-id="${it.id}">リセット</button></td></tr>`}
function cardHtml(it){return `<div id="c${it.id}" class="itemCard ${cls(it)}"><div class="itemHead"><span>${it.id}. ${esc(it.name)}</span><span>${it.running?'計測中':it.stop?'完了':'待機'}</span></div><div class="kv"><div><span>開始</span><b data-cstart="${it.id}">${fmtTime(it.first)}</b></div><div><span>終了</span><b data-cstop="${it.id}">${it.running?'計測中':fmtTime(it.stop)}</b></div><div><span>所要</span><b data-cdur="${it.id}">${fmtDur(elapsed(it))}</b></div></div><div class="cardBtns"><button class="btn green rowbtn" data-a="start" data-id="${it.id}">開始／再開</button><button class="btn red rowbtn" data-a="stop" data-id="${it.id}">停止</button><button class="btn light rowbtn" data-a="reset" data-id="${it.id}">リセット</button></div></div>`}
function updateItem(it){['start','stop','dur'].forEach(k=>{document.querySelectorAll(`[data-${k}="${it.id}"], [data-c${k}="${it.id}"]`).forEach(e=>{e.textContent=k==='start'?fmtTime(it.first):k==='stop'?(it.running?'計測中':fmtTime(it.stop)):fmtDur(elapsed(it))})});const r=$('r'+it.id),c=$('c'+it.id);if(r)r.className=cls(it);if(c)c.className='itemCard '+cls(it)}
function tick(){const run=state.items.find(i=>i.running);if(run)updateItem(run);if(run){els.dot.classList.add('run');els.status.textContent='計測中';els.curName.textContent=run.name;els.curElapsed.textContent=fmtDur(elapsed(run));let idx=state.items.findIndex(i=>i.id===run.id);els.nextBtn.disabled=idx<0||idx>=state.items.length-1}else{els.dot.classList.remove('run');els.status.textContent='待機中';let last=[...state.items].reverse().find(i=>i.stop);els.curName.textContent=last?'直前：'+last.name:'項目を開始してください';els.curElapsed.textContent=last?fmtDur(elapsed(last)):fmtDur(0);els.nextBtn.disabled=true}}
function startItem(id){const it=state.items.find(i=>i.id===id),run=state.items.find(i=>i.running);if(!it)return;if(run&&run.id!==id){alert(`${run.id}番「${run.name}」が計測中です。先に停止してください。`);return}if(it.running)return;const t=now();if(!it.first)it.first=t;it.started=t;it.running=true;it.stop=null;updateItem(it);tick();save();}
function stopItem(id){const it=state.items.find(i=>i.id===id);if(!it)return;if(!it.running){alert('先に開始してください。');return}it.elapsed=elapsed(it);it.running=false;it.started=null;it.stop=now();updateItem(it);tick();save();}
function askReset(id){const it=state.items.find(i=>i.id===id);if(!it)return;confirmBox(`本当にリセットしますか？\n\n${it.id}番「${it.name}」の開始・終了・所要時間を削除します。`,()=>{Object.assign(it,{first:null,stop:null,started:null,elapsed:0,running:false});updateItem(it);tick();save()},'本当にリセットしますか？','OK','いいえ')}
function stopNext(){const run=state.items.find(i=>i.running);if(!run)return;const idx=state.items.findIndex(i=>i.id===run.id);stopItem(run.id);if(idx>=0&&idx<state.items.length-1)startItem(state.items[idx+1].id)}
function printPage(){tick();let total=state.items.reduce((s,i)=>s+elapsed(i),0);let rows=state.items.map(i=>`<tr><td>${i.id}</td><td>${esc(i.name)}</td><td>${fmtTime(i.first)}</td><td>${i.running?'計測中':fmtTime(i.stop)}</td><td>${fmtDur(elapsed(i))}</td></tr>`).join('');let html=`<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>${esc(state.title)} 印刷</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;margin:24px;color:#111827}button{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer}.back{background:#64748b;margin-right:8px}h1{margin:0 0 8px;font-size:24pt}.meta{color:#475569;margin-bottom:16px;line-height:1.6}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{border:1px solid #94a3b8;padding:8px;word-break:break-word}th{background:#e2e8f0}.bar{text-align:right;margin-bottom:16px}.sum{margin-top:12px;font-weight:800}@media print{.bar{display:none}body{margin:0}@page{size:A4;margin:12mm}}</style></head><body><div class="bar"><button class="back" onclick="if(window.opener&&!window.opener.closed){window.close()}else{history.back()}">元のページに戻る</button><button onclick="window.print()">印刷／PDF保存</button></div><h1>${esc(state.title||'式次第')}</h1><div class="meta">表示形式：${state.showSec?'秒まで表示':'分まで表示'}</div><table><thead><tr><th>No</th><th>項目名</th><th>開始</th><th>終了</th><th>所要時間</th></tr></thead><tbody>${rows}</tbody></table><div class="sum">合計所要時間：${fmtDur(total)}</div></body></html>`;let w=window.open('','_blank');if(!w){alert('印刷ページを開けませんでした。ポップアップを許可してください。');return}w.document.open();w.document.write(html);w.document.close();}
function newCreate(){confirmBox('新規作成を行います。\n\n現在のタイトル・項目名・計測結果はすべて削除されます。\n\n最初の設定画面に戻ります。よろしいですか？',()=>{state={title:'式次第',showSec:false,items:[]};localStorage.removeItem(KEY);els.title.value='式次第';els.count.value=10;els.namesArea.innerHTML='';els.rows.innerHTML='';els.cards.innerHTML='';syncSec(false);show('setup');msg('')},'新規作成しますか？','新規作成','いいえ')}
function confirmBox(text,ok,title='確認',okText='OK',noText='いいえ'){pending=ok;els.mTitle.textContent=title;els.mText.textContent=text;els.mOk.textContent=okText;els.mNo.textContent=noText;els.modal.classList.add('on');els.modal.setAttribute('aria-hidden','false');setTimeout(()=>els.mNo.focus(),0)}
function closeModal(){pending=null;els.modal.classList.remove('on');els.modal.setAttribute('aria-hidden','true')}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));els.saveLabel.textContent='自動保存済み'}catch(e){els.saveLabel.textContent='自動保存できませんでした'}}
function load(){try{let raw=localStorage.getItem(KEY);if(!raw)return false;let s=JSON.parse(raw);if(!s||!Array.isArray(s.items)||!s.items.length)return false;state=s;state.items=state.items.map((i,idx)=>({...i,id:idx+1,running:i.running,started:i.running?now():i.started||null}));els.title.value=state.title||'式次第';els.count.value=state.items.length;renderTimer();show('timer');return true}catch(e){return false}}
els.makeBtn.onclick=makeInputs;els.backSetup.onclick=()=>show('setup');els.startBtn.onclick=applyNames;els.sec1.onchange=e=>syncSec(e.target.checked);els.sec2.onchange=e=>syncSec(e.target.checked);els.sec3.onchange=e=>syncSec(e.target.checked);els.nextBtn.onclick=stopNext;els.printBtn.onclick=printPage;els.printBtn2.onclick=printPage;els.editBtn.onclick=()=>{renderNames();show('names')};els.newBtn.onclick=newCreate;els.rows.onclick=els.cards.onclick=e=>{let b=e.target.closest('button[data-a]');if(!b)return;let id=Number(b.dataset.id);if(b.dataset.a==='start')startItem(id);if(b.dataset.a==='stop')stopItem(id);if(b.dataset.a==='reset')askReset(id)};els.mNo.onclick=closeModal;els.mOk.onclick=()=>{let f=pending;closeModal();if(f)f()};els.modal.onclick=e=>{if(e.target===els.modal)closeModal()};document.addEventListener('keydown',e=>{if(e.key==='Escape'&&els.modal.classList.contains('on'))closeModal();if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='p'){e.preventDefault();printPage()}});setInterval(tick,500);window.addEventListener('beforeunload',save);if(!load()){show('setup')}
</script></body></html>
