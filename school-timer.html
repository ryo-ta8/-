<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f8ff">
  <title>学校タイマー</title>
  <style>
    :root{
      --bg:#f4f8ff;--panel:#fff;--ink:#152033;--muted:#65738a;--line:#d9e5f7;
      --blue:#2563eb;--blue-dark:#1d4ed8;--pale:#eaf2ff;--green:#16a34a;
      --orange:#f97316;--red:#e11d48;--shadow:0 18px 55px rgba(38,76,135,.13)
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{margin:0;color:var(--ink);background:radial-gradient(circle at 10% 0,#dbeafe 0,transparent 34%),radial-gradient(circle at 95% 95%,#dcfce7 0,transparent 30%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;touch-action:manipulation}
    button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{outline:4px solid #93c5fd;outline-offset:3px}
    .app{width:min(1100px,calc(100% - 24px));margin:auto;padding:18px 0 34px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:1000;font-size:clamp(22px,3vw,34px)}
    .brand-mark{width:48px;height:48px;display:grid;place-items:center;border-radius:15px;color:#fff;background:linear-gradient(135deg,var(--blue),#22c55e);box-shadow:0 10px 24px rgba(37,99,235,.2)}
    .icon-btn{min-height:48px;padding:0 16px;border:2px solid var(--line);border-radius:15px;background:#fff;color:#334155;font-weight:900}
    .card{background:rgba(255,255,255,.96);border:2px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
    .timer-card{padding:clamp(18px,4vw,38px);text-align:center}
    .activity{min-height:1.4em;margin:0;color:#334155;font-size:clamp(18px,2.5vw,28px);font-weight:950}
    .timer{margin:8px 0 4px;color:var(--blue-dark);font-size:clamp(88px,18vw,190px);font-weight:1000;line-height:.92;letter-spacing:-.055em;font-variant-numeric:tabular-nums;text-shadow:0 9px 26px rgba(37,99,235,.15)}
    .timer.urgent{color:var(--orange)}.timer.done{color:var(--red);animation:pulse .8s ease-in-out 3}
    @keyframes pulse{50%{transform:scale(1.035)}}
    .status{min-height:1.5em;margin:8px 0;color:var(--muted);font-size:clamp(17px,2.4vw,26px);font-weight:950}
    .progress{height:16px;margin:16px auto 0;background:#e5edf8;border-radius:999px;overflow:hidden}
    .bar{height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,#22c55e,#facc15,#f97316);transition:width .2s linear}
    .primary-controls{display:grid;grid-template-columns:minmax(220px,2fr) 1fr 1fr;gap:12px;margin:14px 0}
    .control{min-height:72px;border:0;border-radius:20px;font-weight:1000;font-size:clamp(18px,2vw,24px)}
    .start{color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue-dark));box-shadow:0 14px 28px rgba(37,99,235,.25)}
    .start.running{background:linear-gradient(135deg,#fb923c,#ea580c)}
    .secondary{color:#1e3a8a;background:#fff;border:2px solid #bfd5f5}
    .time-panel{padding:20px}
    .section-title{margin:0 0 12px;font-size:clamp(20px,2.5vw,28px)}
    .presets{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .preset{min-height:58px;border:2px solid #c9dbf5;border-radius:16px;background:#fff;color:#1e3a8a;font-weight:1000;font-size:18px}
    .preset:hover,.preset.selected{border-color:var(--blue);background:var(--pale);color:var(--blue-dark)}
    .custom-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:14px;margin-top:16px}
    .time-field label{display:block;margin:0 0 6px;text-align:center;color:var(--muted);font-weight:900}
    .number-wrap{display:flex;align-items:center;overflow:hidden;border:2px solid #bfd5f5;border-radius:18px;background:#fff}
    .step{width:54px;align-self:stretch;border:0;background:#edf4ff;color:var(--blue-dark);font-size:28px;font-weight:1000}
    .time-input{width:100%;min-width:0;height:64px;border:0;text-align:center;color:var(--ink);font-size:30px;font-weight:1000;font-variant-numeric:tabular-nums;-moz-appearance:textfield}
    .time-input::-webkit-inner-spin-button,.time-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    .colon{padding-bottom:10px;font-size:38px;font-weight:1000}
    .nudge-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
    .nudge{min-height:48px;border:2px solid #d1def0;border-radius:14px;background:#f8fbff;color:#334155;font-weight:950}
    .hint{margin:14px 0 0;text-align:center;color:var(--muted);font-size:14px;font-weight:800}
    details{margin-top:14px;overflow:hidden}
    summary{padding:18px 20px;cursor:pointer;list-style:none;font-size:20px;font-weight:1000}
    summary::-webkit-details-marker{display:none}
    summary::after{content:'＋';float:right;color:var(--blue)}details[open] summary::after{content:'−'}
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 20px 20px}
    .field.full{grid-column:1/-1}.field label{display:block;margin-bottom:6px;color:#334155;font-weight:900}
    .field input,.field select,.field textarea{width:100%;min-height:52px;padding:10px 12px;border:2px solid #cbdcf3;border-radius:14px;background:#fff;color:var(--ink);font-weight:800}
    .field textarea{min-height:78px;resize:vertical}
    .message{margin:14px 0 0;text-align:center;color:#475569;font-size:clamp(16px,2.3vw,24px);font-weight:850;line-height:1.45}
    .toast{position:fixed;z-index:30;left:50%;top:16px;width:min(620px,calc(100% - 24px));padding:16px;transform:translate(-50%,-140%);opacity:0;border:3px solid #93c5fd;border-radius:20px;background:#fff;text-align:center;font-size:clamp(20px,3vw,32px);font-weight:1000;box-shadow:0 22px 55px rgba(37,99,235,.22);transition:.2s}
    .toast.show{transform:translate(-50%,0);opacity:1}
    body.focus{overflow:hidden;background:#fff}
    body.focus .app{position:fixed;inset:0;width:100%;padding:10px;display:grid;grid-template-rows:auto 1fr auto}
    body.focus .topbar{justify-content:flex-end;margin:0}body.focus .brand{display:none}
    body.focus .timer-card{display:grid;align-content:center;border:0;box-shadow:none;padding:0}
    body.focus .timer{font-size:clamp(130px,28vw,390px)}body.focus .activity{font-size:clamp(25px,5vw,62px)}body.focus .status{font-size:clamp(24px,4vw,52px)}
    body.focus .time-panel,body.focus details{display:none}body.focus .primary-controls{margin:8px 0;grid-template-columns:2fr 1fr 1fr}body.focus .control{min-height:64px}
    @media(max-width:760px){.presets{grid-template-columns:repeat(4,1fr)}.primary-controls{grid-template-columns:1fr 1fr}.primary-controls .start{grid-column:1/-1}.settings-grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
    @media(max-width:480px){.app{width:min(100% - 16px,1100px);padding-top:8px}.brand-mark{width:40px;height:40px}.icon-btn{padding:0 11px}.card{border-radius:22px}.timer-card{padding:20px 12px}.timer{font-size:clamp(78px,27vw,128px)}.time-panel{padding:15px}.presets{grid-template-columns:repeat(3,1fr)}.custom-row{gap:7px}.step{width:42px}.time-input{height:58px;font-size:25px}.nudge-row{grid-template-columns:1fr 1fr}.primary-controls{gap:8px}.control{min-height:62px}body.focus .primary-controls{grid-template-columns:1fr 1fr}body.focus .primary-controls .start{grid-column:1/-1}}
  </style>
</head>
<body>
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>
  <main class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-mark" aria-hidden="true">⏱</span><span>学校タイマー</span></div>
      <button id="focus" class="icon-btn" type="button" aria-pressed="false">⛶ 大画面</button>
    </header>

    <section class="timer-card card" aria-live="polite">
      <p id="activity" class="activity">話し合いタイム</p>
      <div id="timer" class="timer">05:00</div>
      <p id="status" class="status">時間を選んで、はじめるを押します</p>
      <div class="progress" aria-hidden="true"><div id="bar" class="bar"></div></div>
      <p id="message" class="message">相手の方を見て、順番に意見を出しましょう。</p>
    </section>

    <section class="primary-controls" aria-label="タイマー操作">
      <button id="startPause" class="control start" type="button">▶ はじめる</button>
      <button id="reset" class="control secondary" type="button">↺ もどす</button>
      <button id="addMinute" class="control secondary" type="button">＋ 1分</button>
    </section>

    <section class="time-panel card" aria-labelledby="time-title">
      <h2 id="time-title" class="section-title">何分にしますか？</h2>
      <div id="presets" class="presets" aria-label="よく使う時間"></div>
      <div class="custom-row">
        <div class="time-field">
          <label for="minutes">分</label>
          <div class="number-wrap"><button class="step" type="button" data-adjust="-60" aria-label="1分減らす">−</button><input id="minutes" class="time-input" type="number" inputmode="numeric" min="0" max="999" value="5"><button class="step" type="button" data-adjust="60" aria-label="1分増やす">＋</button></div>
        </div>
        <span class="colon" aria-hidden="true">:</span>
        <div class="time-field">
          <label for="seconds">秒</label>
          <div class="number-wrap"><button class="step" type="button" data-adjust="-10" aria-label="10秒減らす">−</button><input id="seconds" class="time-input" type="number" inputmode="numeric" min="0" max="59" value="0"><button class="step" type="button" data-adjust="10" aria-label="10秒増やす">＋</button></div>
        </div>
      </div>
      <div class="nudge-row" aria-label="時間を調整">
        <button class="nudge" type="button" data-adjust="-300">−5分</button><button class="nudge" type="button" data-adjust="-60">−1分</button><button class="nudge" type="button" data-adjust="60">＋1分</button><button class="nudge" type="button" data-adjust="300">＋5分</button>
      </div>
      <p class="hint">時間は数字を直接入力することもできます</p>
    </section>

    <details class="card">
      <summary>活動名・メッセージ・音の設定</summary>
      <div class="settings-grid">
        <div class="field"><label for="activityInput">活動名</label><input id="activityInput" value="話し合いタイム"></div>
        <div class="field"><label for="soundMode">終了音</label><select id="soundMode"><option value="chime">チャイム</option><option value="beep">電子音</option><option value="none">鳴らさない</option></select></div>
        <div class="field full"><label for="messageInput">画面に出すメッセージ</label><textarea id="messageInput">相手の方を見て、順番に意見を出しましょう。</textarea></div>
        <button id="soundTest" class="icon-btn" type="button">♪ 音を試す</button>
      </div>
    </details>
  </main>

  <script>
    const presetMinutes=[1,3,5,10,15,20,45];
    const $=id=>document.getElementById(id);
    const timer=$('timer'),status=$('status'),bar=$('bar'),toast=$('toast');
    let total=300,remaining=300,running=false,endAt=0,tickId=0,toastId=0,audioCtx=null,finished=false;

    function clamp(n,min,max){return Math.min(max,Math.max(min,n))}
    function fmt(seconds){seconds=Math.max(0,Math.round(seconds));return String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0')}
    function inputSeconds(){return clamp((parseInt($('minutes').value,10)||0)*60+(parseInt($('seconds').value,10)||0),1,59999)}
    function writeInputs(seconds){seconds=clamp(Math.round(seconds),1,59999);$('minutes').value=Math.floor(seconds/60);$('seconds').value=seconds%60}
    function save(){localStorage.setItem('schoolTimerV2',JSON.stringify({seconds:inputSeconds(),activity:$('activityInput').value,message:$('messageInput').value,sound:$('soundMode').value}))}
    function render(){
      timer.textContent=fmt(remaining);
      timer.classList.toggle('urgent',!finished&&remaining>0&&remaining<=10);
      timer.classList.toggle('done',finished);
      $('activity').textContent=$('activityInput').value||'活動名';
      $('message').textContent=$('messageInput').value||'';
      bar.style.width=Math.min(100,Math.max(0,((total-remaining)/total)*100))+'%';
      document.title=fmt(remaining)+'｜学校タイマー';
      document.querySelectorAll('.preset').forEach(b=>b.classList.toggle('selected',Number(b.dataset.minutes)*60===inputSeconds()));
      save();
    }
    function show(text){clearTimeout(toastId);toast.textContent=text;toast.classList.add('show');toastId=setTimeout(()=>toast.classList.remove('show'),2200)}
    function tone(test=false){
      const mode=test&&$('soundMode').value==='none'?'chime':$('soundMode').value;if(mode==='none')return;
      audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
      const now=audioCtx.currentTime,notes=mode==='beep'?[880,880,880]:[659,784,988,1318];
      notes.forEach((frequency,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=mode==='beep'?'square':'sine';o.frequency.value=frequency;g.gain.setValueAtTime(.0001,now+i*.18);g.gain.exponentialRampToValueAtTime(.25,now+i*.18+.03);g.gain.exponentialRampToValueAtTime(.0001,now+i*.18+.16);o.connect(g).connect(audioCtx.destination);o.start(now+i*.18);o.stop(now+i*.18+.18)});
    }
    function setTime(seconds,announce=''){
      if(running)return;
      finished=false;total=remaining=clamp(Math.round(seconds),1,59999);writeInputs(total);status.textContent='準備できました';render();if(announce)show(announce);
    }
    function startPause(){
      if(running){pause();return}
      if(finished||remaining<=0){remaining=total;finished=false}
      running=true;endAt=Date.now()+remaining*1000;$('startPause').textContent='Ⅱ 一時停止';$('startPause').classList.add('running');status.textContent='計っています';tickId=setInterval(tick,200);tick();
    }
    function pause(){
      if(!running)return;clearInterval(tickId);remaining=Math.max(0,Math.ceil((endAt-Date.now())/1000));running=false;$('startPause').textContent='▶ つづける';$('startPause').classList.remove('running');status.textContent='一時停止中';render();
    }
    function tick(){
      remaining=Math.max(0,Math.ceil((endAt-Date.now())/1000));render();
      if(remaining<=0){clearInterval(tickId);running=false;finished=true;$('startPause').textContent='▶ もう一度';$('startPause').classList.remove('running');status.textContent='時間です！';render();tone();show('時間です！')}
    }
    function reset(){clearInterval(tickId);running=false;finished=false;total=inputSeconds();remaining=total;$('startPause').textContent='▶ はじめる';$('startPause').classList.remove('running');status.textContent='時間を選んで、はじめるを押します';render()}
    function adjust(seconds){
      if(running){remaining=Math.max(1,remaining+seconds);total=Math.max(remaining,total+seconds);endAt+=seconds*1000;writeInputs(total);render();show((seconds>0?'+':'')+(seconds/60)+'分しました');return}
      setTime(inputSeconds()+seconds);
    }

    presetMinutes.forEach(min=>{const b=document.createElement('button');b.type='button';b.className='preset';b.dataset.minutes=min;b.textContent=min+'分';b.onclick=()=>setTime(min*60,min+'分にしました');$('presets').appendChild(b)});
    document.querySelectorAll('[data-adjust]').forEach(b=>b.addEventListener('click',()=>adjust(Number(b.dataset.adjust))));
    ['minutes','seconds'].forEach(id=>$(id).addEventListener('change',()=>setTime(inputSeconds())));
    ['activityInput','messageInput','soundMode'].forEach(id=>$(id).addEventListener('input',render));
    $('startPause').onclick=startPause;$('reset').onclick=reset;$('addMinute').onclick=()=>adjust(60);$('soundTest').onclick=()=>tone(true);
    $('focus').onclick=()=>{document.body.classList.toggle('focus');const on=document.body.classList.contains('focus');$('focus').textContent=on?'× 大画面終了':'⛶ 大画面';$('focus').setAttribute('aria-pressed',on)};
    document.addEventListener('keydown',e=>{if(e.target.matches('input,textarea,select'))return;if(e.code==='Space'){e.preventDefault();startPause()}if(e.key.toLowerCase()==='r')reset();if(e.key==='Escape'&&document.body.classList.contains('focus'))$('focus').click()});
    try{const s=JSON.parse(localStorage.getItem('schoolTimerV2')||'{}');if(s.seconds)writeInputs(s.seconds);if(s.activity)$('activityInput').value=s.activity;if(s.message!==undefined)$('messageInput').value=s.message;if(s.sound)$('soundMode').value=s.sound}catch(e){}
    total=remaining=inputSeconds();render();
  </script>
</body>
</html>
