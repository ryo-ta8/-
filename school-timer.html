<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学校大画面タイマー</title>
  <style>
    :root { --bg:#eef6ff; --panel:#fff; --ink:#102033; --muted:#5b6b80; --blue:#2563eb; --green:#16a34a; --orange:#f97316; --red:#e11d48; --line:#c7ddff; --shadow:0 22px 60px rgba(37,99,235,.16); }
    *{box-sizing:border-box} html,body{min-height:100%;} body{margin:0;color:var(--ink);background:radial-gradient(circle at 10% 0,rgba(96,165,250,.35),transparent 32%),radial-gradient(circle at 90% 100%,rgba(34,197,94,.22),transparent 30%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;} button,input,select,textarea{font:inherit} button{cursor:pointer}.app{width:min(1220px,calc(100% - 24px));margin:auto;padding:18px 0 28px}.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,440px);gap:16px;align-items:stretch}.card{background:rgba(255,255,255,.94);border:2px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.title{padding:22px;display:flex;gap:16px;align-items:center}.logo{width:76px;height:76px;display:grid;place-items:center;border-radius:24px;background:linear-gradient(135deg,#2563eb,#22c55e);font-size:42px;color:#fff;box-shadow:0 16px 36px rgba(37,99,235,.25)}h1{margin:0;font-size:clamp(32px,5vw,58px);line-height:1}.lead{margin:10px 0 0;color:var(--muted);font-weight:800;font-size:clamp(15px,2vw,19px);line-height:1.55}.timer-card{padding:18px;text-align:center}.label{color:var(--muted);font-weight:950;letter-spacing:.12em}.timer{font-size:clamp(76px,13vw,150px);font-weight:1000;line-height:.95;font-variant-numeric:tabular-nums;color:#1d4ed8;text-shadow:0 8px 20px rgba(37,99,235,.16)}.timer.overtime{color:var(--red)}.status{min-height:34px;margin-top:8px;font-size:clamp(18px,2.4vw,28px);font-weight:950}.progress{height:18px;margin-top:14px;background:#dbeafe;border-radius:999px;overflow:hidden;box-shadow:inset 0 0 0 2px rgba(96,165,250,.45)}.bar{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#facc15,#f97316,#e11d48);border-radius:inherit;transition:width .2s}.templates{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:16px 0}.template{min-height:74px;border:2px solid #bfdbfe;border-radius:20px;background:#fff;color:#1e3a8a;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.08)}.template span{display:block;color:var(--muted);font-size:13px;margin-top:4px}.controls{display:grid;grid-template-columns:2fr repeat(5,1fr);gap:10px;margin-bottom:16px}.btn{min-height:60px;border:0;border-radius:18px;color:#fff;background:linear-gradient(135deg,#2563eb,#1d4ed8);font-weight:950;box-shadow:0 14px 28px rgba(37,99,235,.20)}.btn.secondary{background:#fff;color:#1e3a8a;border:2px solid #bfdbfe;box-shadow:none}.btn.green{background:linear-gradient(135deg,#22c55e,#15803d)}.btn.orange{background:linear-gradient(135deg,#fb923c,#c2410c)}.btn.red{background:linear-gradient(135deg,#fb7185,#e11d48)}.btn:disabled{opacity:.5;cursor:not-allowed}.main{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:16px}.board{padding:18px;display:grid;align-content:center;text-align:center;min-height:330px}.activity{margin:0;font-size:clamp(40px,7vw,88px);line-height:1.1}.hint{margin:18px auto 0;max-width:820px;color:var(--muted);font-size:clamp(22px,3.2vw,40px);font-weight:950;line-height:1.35}.settings{padding:18px}.settings h2{margin:0 0 14px;font-size:25px}.field{margin-bottom:13px}label{display:block;margin-bottom:7px;color:#1e3a8a;font-weight:950}input,select,textarea{width:100%;min-height:50px;border:2px solid #bfdbfe;border-radius:15px;background:#fff;padding:10px 12px;color:var(--ink);font-weight:850}textarea{min-height:94px;resize:vertical}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{font-size:13px;color:var(--muted);font-weight:800;line-height:1.45}.toast{position:fixed;left:50%;top:18px;transform:translate(-50%,-140%);opacity:0;z-index:20;width:min(680px,calc(100% - 24px));padding:18px;border:3px solid #93c5fd;border-radius:24px;background:#fff;text-align:center;font-size:clamp(22px,4vw,44px);font-weight:1000;box-shadow:0 24px 60px rgba(37,99,235,.24);transition:.22s}.toast.show{transform:translate(-50%,0);opacity:1}body.focus{overflow:hidden}body.focus .app{position:fixed;inset:0;width:100%;display:grid;grid-template-rows:1fr auto;padding:12px;background:var(--bg)}body.focus .title,body.focus .templates,body.focus .settings{display:none}body.focus .hero{display:block}.focus .timer-card{height:100%;display:grid;align-content:center}.focus .timer{font-size:clamp(110px,24vw,300px)}.focus .status{font-size:clamp(34px,6vw,84px)}body.focus .main{display:block}.focus .board{min-height:0;height:100%;border:0;background:transparent;box-shadow:none}.focus .activity{font-size:clamp(54px,10vw,140px)}.focus .hint{font-size:clamp(30px,5vw,76px)}.focus .controls{margin:0;grid-template-columns:repeat(6,1fr)}@media(max-width:900px){.hero,.main{grid-template-columns:1fr}.templates{grid-template-columns:1fr 1fr}.controls{grid-template-columns:1fr 1fr}.controls .btn:first-child{grid-column:span 2}}@media(max-width:560px){.title{align-items:flex-start}.logo{width:58px;height:58px;font-size:32px}.templates,.controls,.split{grid-template-columns:1fr}.controls .btn:first-child{grid-column:auto}.timer{font-size:clamp(66px,22vw,120px)}}
  </style>
</head>
<body>
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>
  <main class="app">
    <section class="hero">
      <div class="title card">
        <div class="logo" aria-hidden="true">⏱️</div><div><h1>学校大画面タイマー</h1><p class="lead">電子黒板・プロジェクターで見やすい授業用タイマーです。朝の会、話し合い、発表練習、休み時間などのテンプレートを選んで、すぐ大きく表示できます。</p></div>
      </div>
      <div class="timer-card card" aria-live="polite"><div class="label">のこり時間</div><div id="timer" class="timer">05:00</div><div id="status" class="status">テンプレートを選ぶか、設定して開始</div><div class="progress"><div id="bar" class="bar"></div></div></div>
    </section>
    <section id="templates" class="templates" aria-label="タイマーテンプレート"></section>
    <section class="controls" aria-label="操作"><button id="start" class="btn" type="button">▶ はじめる</button><button id="pause" class="btn secondary" type="button" disabled>一時停止</button><button id="reset" class="btn green" type="button">リセット</button><button id="addMinute" class="btn secondary" type="button">＋1分</button><button id="sound" class="btn orange" type="button">音を試す</button><button id="focus" class="btn red" type="button">大画面</button></section>
    <section class="main"><div class="board card"><h2 id="activity" class="activity">活動名</h2><p id="hint" class="hint">やることや注意をここに表示できます。</p></div><aside class="settings card"><h2>設定</h2><div class="field"><label for="activityInput">活動名</label><input id="activityInput" value="話し合いタイム"></div><div class="split"><div class="field"><label for="minutes">分</label><input id="minutes" type="number" min="0" max="999" value="5"></div><div class="field"><label for="seconds">秒</label><input id="seconds" type="number" min="0" max="59" value="0"></div></div><div class="field"><label for="hintInput">画面に出すメッセージ</label><textarea id="hintInput">相手の方を見て、順番に意見を出しましょう。</textarea></div><div class="field"><label for="soundMode">終了音</label><select id="soundMode"><option value="chime">チャイム</option><option value="beep">短い電子音</option><option value="none">鳴らさない</option></select></div><p class="mini">設定はこのブラウザに自動保存されます。「大画面」はEscキーまたは同じボタンで終了できます。</p></aside></section>
  </main>
  <script>
    const templates=[{name:"朝の会",min:3,sec:0,hint:"健康観察と今日の予定を確認しましょう。"},{name:"話し合い",min:5,sec:0,hint:"役割を決めて、全員が1回以上話しましょう。"},{name:"発表練習",min:2,sec:0,hint:"声の大きさ・目線・時間を意識しましょう。"},{name:"片付け",min:4,sec:0,hint:"机の上、床、道具箱を確認しましょう。"},{name:"読書",min:10,sec:0,hint:"静かに読み、終わったら感想を一言考えましょう。"},{name:"休み時間",min:20,sec:0,hint:"次の授業の準備も忘れずに。"},{name:"テスト",min:45,sec:0,hint:"最後に名前と見直しを確認しましょう。"},{name:"カスタム",min:5,sec:0,hint:"設定欄で自由に変えられます。"}];
    const $=id=>document.getElementById(id), timer=$('timer'), status=$('status'), bar=$('bar'), activity=$('activity'), hint=$('hint'), toast=$('toast');
    let total=300, remaining=300, running=false, endAt=0, tickId=0, toastId=0, audioCtx=null;
    function fmt(s){const sign=s<0?'-':'';s=Math.abs(s);return sign+String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
    function readTotal(){const m=Math.max(0,parseInt($('minutes').value,10)||0), s=Math.min(59,Math.max(0,parseInt($('seconds').value,10)||0));return Math.max(1,m*60+s)}
    function save(){localStorage.setItem('schoolTimerSettings',JSON.stringify({activity:$('activityInput').value,hint:$('hintInput').value,minutes:$('minutes').value,seconds:$('seconds').value,sound:$('soundMode').value}))}
    function render(){timer.textContent=fmt(remaining); timer.classList.toggle('overtime',remaining<=0); activity.textContent=$('activityInput').value||'活動名'; hint.textContent=$('hintInput').value||'やることや注意をここに表示できます。'; const done=Math.min(100,Math.max(0,((total-remaining)/total)*100)); bar.style.width=done+'%'; save()}
    function show(text){clearTimeout(toastId);toast.textContent=text;toast.classList.add('show');toastId=setTimeout(()=>toast.classList.remove('show'),3600)}
    function tone(kind='chime'){if($('soundMode').value==='none'&&kind!=='test')return;audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const now=audioCtx.currentTime;const notes=kind==='beep'?[880,880,880]:[659,784,988,1318];notes.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=kind==='beep'?'square':'sine';o.frequency.value=f;g.gain.setValueAtTime(.0001,now+i*.18);g.gain.exponentialRampToValueAtTime(.26,now+i*.18+.03);g.gain.exponentialRampToValueAtTime(.0001,now+i*.18+.16);o.connect(g).connect(audioCtx.destination);o.start(now+i*.18);o.stop(now+i*.18+.18)})}
    function applySettings(reset=true){total=readTotal(); if(reset) remaining=total; render()}
    function start(){if(running)return; if(remaining<=0)remaining=total; running=true; endAt=Date.now()+remaining*1000; $('start').disabled=true; $('pause').disabled=false; status.textContent='実行中です'; tickId=setInterval(tick,200); tick()}
    function tick(){remaining=Math.ceil((endAt-Date.now())/1000); render(); if(remaining<=0){clearInterval(tickId);running=false;$('start').disabled=false;$('pause').disabled=true;status.textContent='時間です！';tone($('soundMode').value);show('時間です！')}}
    function pause(){if(!running)return; clearInterval(tickId); remaining=Math.max(0,Math.ceil((endAt-Date.now())/1000)); running=false; $('start').disabled=false; $('pause').disabled=true; status.textContent='一時停止中'; render()}
    function reset(){clearInterval(tickId);running=false;applySettings(true);$('start').disabled=false;$('pause').disabled=true;status.textContent='リセットしました'}
    function useTemplate(t){$('activityInput').value=t.name;$('minutes').value=t.min;$('seconds').value=t.sec;$('hintInput').value=t.hint;reset();show(`${t.name}テンプレートにしました`)}
    templates.forEach(t=>{const b=document.createElement('button');b.className='template';b.type='button';b.innerHTML=`${t.name}<span>${t.min}:${String(t.sec).padStart(2,'0')}</span>`;b.onclick=()=>useTemplate(t);$('templates').appendChild(b)});
    ['activityInput','hintInput','soundMode'].forEach(id=>$(id).addEventListener('input',render)); ['minutes','seconds'].forEach(id=>$(id).addEventListener('input',()=>applySettings(!running)));
    $('start').onclick=start; $('pause').onclick=pause; $('reset').onclick=reset; $('addMinute').onclick=()=>{remaining+=60; total+=60; $('minutes').value=Math.floor(total/60); $('seconds').value=total%60; if(running)endAt+=60000; render(); show('1分追加しました')}; $('sound').onclick=()=>tone('test'); $('focus').onclick=()=>{document.body.classList.toggle('focus');$('focus').textContent=document.body.classList.contains('focus')?'大画面終了':'大画面'}; document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.body.classList.contains('focus'))$('focus').click()});
    try{const s=JSON.parse(localStorage.getItem('schoolTimerSettings')||'{}'); if(s.activity)$('activityInput').value=s.activity; if(s.hint)$('hintInput').value=s.hint; if(s.minutes)$('minutes').value=s.minutes; if(s.seconds)$('seconds').value=s.seconds; if(s.sound)$('soundMode').value=s.sound;}catch(e){}
    reset();
  </script>
</body>
</html>
